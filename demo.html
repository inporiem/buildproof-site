        return <BuildingPassport buildingId={currentBuilding} extraReports={bridgedReports} onBack={() => setView('buildings')} onOpenReport={(ref) => { setCurrentReport(ref); setView('passport-report'); }}/>;
      }
      case 'passport-report':   {
        // Same bridge for direct-deep-link
        const projectIdToBuilding = { 'oakgrove-holly': 'holly', 'dreyer': 'dreyer' };
        const bridgedReports = userPacks
          .filter(p => p.status === 'sent' || p.status === 'approved')
          .filter(p => projectIdToBuilding[p.projectId])
          .map(p => {
            const recs = userRecords.filter(r => p.recordIds.includes(r.id));
            const totalPhotos = recs.reduce((n, r) => n + (r.photoCount || 4), 0) + (p.mockExtraPhotos || 0);
            const totalRecs = p.recordIds.length + (p.mockExtraRecords || 0);
            return {
              ref: `BP-2026-${(p.dateSent || p.dateCreated || '2026-05-07').replace(/-/g, '').slice(4)}-${(p.id.slice(-4) || '0000').toUpperCase()}`,
              building: projectIdToBuilding[p.projectId],
              date: p.dateSent || p.dateCreated,
              contractor: p.composer === 'James Walsh' ? 'TimberTech Contractors' : `${p.composer} (operative)`,
              workType: PROJECT_META[p.projectId] && PROJECT_META[p.projectId].workTypeLabel || 'Project',
              records: totalRecs, photos: totalPhotos,
              summary: p.name,
              isNew: !PASSPORT_REPORTS.find(pr => pr.summary === p.name),
              _packId: p.id,
            };
          });
        return <PassportReportView reportRef={currentReport} extraReports={bridgedReports} onBack={() => setView('building-passport')} onOpenRecord={(id) => { setCurrentRecord(id); setView('record-detail'); }} onOpenFullReport={() => setView('sent-report-preview')} onVerifyHashes={() => setView('hash-verify')} onQuery={() => setView('query-record')} onOpenCounterSign={() => {
          // When QS approves, mark the underlying pack as approved
          const bridgedRef = bridgedReports.find(br => br.ref === currentReport);
          if (bridgedRef && bridgedRef._packId) {
            setUserPacks(prev => prev.map(p => p.id === bridgedRef._packId ? { ...p, status: 'approved', dateApproved: new Date().toISOString().slice(0, 10) } : p));
          }
          setView('report-approved');
        }}/>;
      }
      case 'query-record':     return <QueryRecord
        reportRef={currentReport}
        onBack={() => setView('passport-report')}
        onSubmit={(query) => {
          setUserQueries(prev => [...prev, query]);
          setCurrentQuery(query);
          setView('query-sent');
        }}
      />;
      case 'query-sent':       return <QuerySent
        query={currentQuery}
        onBackToReport={() => setView('passport-report')}
        onSwitchRole={() => setView('role-picker')}
      />;
      case 'report-approved': return <ReportApproved onBackToPassport={() => setView('building-passport')} onSwitchRole={() => setView('role-picker')}/>;
      case 'record-detail':     return <RecordDetail recordId={currentRecord} onBack={() => setView('passport-report')} onOpenVerification={() => setView('hash-verify')}/>;
      case 'hash-verify':       return <HashVerify recordId={currentRecord} onBack={() => setView('record-detail')} onOpenRecord={() => setView('record-detail')}/>;
      case 'homeowner-home':    return <HomeownerHome packs={userPacks} records={userRecords} onStartProject={() => setView('homeowner-setup')} onOpenProject={() => setView('homeowner-project')} onOpenFindBuilder={() => setView('homeowner-find-builder')} onSwitchRole={() => setView('role-picker')}/>;
      case 'homeowner-setup':   return <HomeownerSetup onBack={() => setView('homeowner-home')} onAccepted={() => setView('homeowner-project')}/>;
      case 'homeowner-project': return <HomeownerProject
        packs={userPacks}
        records={userRecords}
        onApprovePack={(packId) => setUserPacks(prev => prev.map(p => p.id === packId ? { ...p, status: 'approved', dateApproved: new Date().toISOString().slice(0, 10) } : p))}
        onBack={() => setView('homeowner-home')}/>;
      case 'homeowner-find-builder': return <FindBuilder onBack={() => setView('homeowner-home')} onOpenBuilder={(id) => { setCurrentBuilder(id); setView('builder-profile'); }}/>;
      case 'builder-profile':   return <BuilderProfile builderId={currentBuilder} onBack={() => setView('homeowner-find-builder')}/>;
    }
  };

  return (
    <div className={`page ${demoMode ? 'demo-mode' : ''} ${tourMode && demoMode ? 'tour-on' : ''}`}>
      {!demoMode && (
        <aside className="side">
          <div className="brand">
            <span className="brand-b">BuildProof</span>
            <span className="brand-p">v3</span>
          </div>

          {NAV.map(group => (
            <div key={group.g} style={{marginBottom: 24}}>
              <div className="nav-group-hdr">{group.g}</div>
              {group.items.map((item, idx) => (
                <button key={`${item.id}-${idx}`} onClick={() => {
                  if (item.state) {
                    if (item.state.currentBuilder) setCurrentBuilder(item.state.currentBuilder);
                    if (item.state.currentProject) setCurrentProject(item.state.currentProject);
                  }
                  // The second profile entry uses 'builder-profile-h' as id but routes to 'builder-profile'
                  setView(item.id === 'builder-profile-h' ? 'builder-profile' : item.id);
                }} className={`nav-item ${view === item.id || (item.id === 'builder-profile-h' && view === 'builder-profile' && currentBuilder === 'hassan') ? 'active' : ''}`}>
                  <span>{item.t}</span>
                  <span className="nav-id">{item.sid}</span>
                </button>
              ))}
            </div>
          ))}

          <div style={{marginTop: 32, padding: 16, background: 'white', border: '1px solid var(--line)', borderRadius: 12, fontSize: 12, lineHeight: 1.5, color: 'var(--ink-3)'}}>
            <div style={{display: 'flex', alignItems: 'center', gap: 6, color: 'var(--ink-1)', fontWeight: 600, marginBottom: 6}}>
              <Icon.Lock s={13}/> Designed for site
            </div>
            Large tap targets · voice input · autosave · forgiving undo · gloves-compatible.
          </div>
        </aside>
      )}

      <main className="stage">
        <div style={{display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16}}>
          <div style={{display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16}}>
            <div className="phone">
              <div className="notch"></div>
              {render()}
              <div className="home-ind"></div>
            </div>
            {demoMode && VIEW_CODES[view] && (
              <div className="page-code-ref">{VIEW_CODES[view]}</div>
            )}

            {demoMode && (canGoBack || canGoForward) && (
            <div style={{display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px', background: 'rgba(255,255,255,.6)', backdropFilter: 'blur(8px)', borderRadius: 999, border: '1px solid var(--line)', boxShadow: '0 2px 8px rgba(0,0,0,.04)'}}>
              <button
                onClick={goBack}
                disabled={!canGoBack}
                style={{
                  width: 36, height: 36, borderRadius: 18,
                  background: canGoBack ? 'var(--ink-1)' : 'transparent',
                  color: canGoBack ? 'white' : 'var(--ink-4)',
                  border: 'none',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  cursor: canGoBack ? 'pointer' : 'default',
                  opacity: canGoBack ? 1 : 0.35,
                  fontFamily: 'Inter Tight',
                }}
                title="Back"
              >
                <Icon.Back s={18}/>
              </button>
              <span className="mono" style={{fontSize: 9, color: 'var(--ink-3)', letterSpacing: 0.08, textTransform: 'uppercase', fontWeight: 600, padding: '0 4px'}}>
                Demo nav
              </span>
              <button
                onClick={goForward}
                disabled={!canGoForward}
                style={{
                  width: 36, height: 36, borderRadius: 18,
                  background: canGoForward ? 'var(--ink-1)' : 'transparent',
                  color: canGoForward ? 'white' : 'var(--ink-4)',
                  border: 'none',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  cursor: canGoForward ? 'pointer' : 'default',
                  opacity: canGoForward ? 1 : 0.35,
                  fontFamily: 'Inter Tight',
                  transform: 'rotate(180deg)',
                }}
                title="Forward"
              >
                <Icon.Back s={18}/>
              </button>
            </div>
          )}
          </div>
          {tourMode && demoMode && TOUR_STEPS[view] && (
            <TourPanel view={view} onExit={() => setTourMode(false)} onJumpHome={() => { setView('role-picker'); }}/>
          )}
        </div>
      </main>

      {!demoMode && (
        <aside className="notes">
        <div style={{marginBottom: 28, paddingBottom: 28, borderBottom: '1px solid var(--line)'}}>
          <div className="nav-group-hdr" style={{padding: 0, marginBottom: 8}}>Flow notes</div>
          <div className="serif" style={{fontSize: 24, letterSpacing: '-0.02em'}}>{NAV.flatMap(g => g.items).find(i => i.id === view)?.t}</div>
        </div>

        <div style={{fontSize: 13, lineHeight: 1.6, color: 'var(--ink-2)'}}>
          {{
            home: (<>
              <p><b>Hero-led.</b> The loudest thing on screen is the job waiting on you. Everything else — active jobs, start-new buttons — is ranked smaller.</p>
              <p style={{marginTop: 12}}>The name is the biggest element — this is Dave's app.</p>
              <p style={{marginTop: 12}}>The two jobs use a left accent bar and a large record count instead of badges and progress bars. Less chrome, more legible data.</p>
            </>),
            scan: (<>
              <p><b>Dark camera sheet.</b> Four corner markers, a subtle scan line, a quiet "searching" label. No chrome.</p>
              <p style={{marginTop: 12}}>Explicit fallback "Type the plot reference" — critical for when the QR is smudged, lit wrong, or doesn't exist yet.</p>
            </>),
            job: (<>
              <p>No longer used — replaced by Building + Apartment views.</p>
            </>),
            building: (<>
              <p><b>Whole building at a glance.</b> 12-apartment grid with status colours — done (green tick), your active work (teal + dot), teammate's work (amber), blocked (red), not started (grey).</p>
              <p style={{marginTop: 12}}>Your active flats rise to the top in a "Yours today" list — lets Dave pick up where he left off in one tap rather than scrolling through the grid.</p>
              <p style={{marginTop: 12}}>Common areas (stairwells, plant rooms, lobbies) live beneath the apartment grid because that's physically how builders think about a site.</p>
              <p style={{marginTop: 12}}>Hero stat is <i>records across building</i> (54/168) — meaningful number for a foreman checking progress, not vanity stat for the operative.</p>
            </>),
            apartment: (<>
              <p><b>Black contextual header</b> ("You're in · Flat 504") makes location unmistakable. Tap to open the flat switcher.</p>
              <p style={{marginTop: 12}}>Switcher is a bottom sheet with "Yours today" (the flats Dave's active in) at the top, then the full building grid, plus a "Scan plot board" fallback.</p>
              <p style={{marginTop: 12}}>"Up next" teal card points at the specific next element. Recent captures (element 6, 5, 4...) are visible but muted — operative scans forward, not back.</p>
              <p style={{marginTop: 12}}>Element list shows 14 rows per flat, state-coloured (done green, next teal, todo neutral). Tap any todo element to jump straight to capture — no forced linear path.</p>
              <p style={{marginTop: 12}}>"+ Add custom" acknowledges that real sites have unexpected elements not in the spec — important escape hatch.</p>
            </>),
            capture: (<>
              <p><b>Three photo groups, not fixed slots.</b> Installation, Product label, Drawing. Each accepts 1–N photos via add-another tiles.</p>
              <p style={{marginTop: 12}}><b>Drawing is first-class.</b> If the QS uploaded a drawing, tap "Use this" and you're linked. If you're working from paper, photograph it. Required — can't save without it.</p>
              <p style={{marginTop: 12}}><b>Pin on drawing.</b> Tapping "Pin where you photographed" opens a dark full-screen view of the drawing. Tap anywhere to drop a numbered pin. Each pin maps to a photo in the install group.</p>
              <p style={{marginTop: 12}}>Toast confirmation ("Saved to your pack") floats in on every capture. Non-modal, non-blocking, gone in 2s.</p>
              <p style={{marginTop: 12}}>Save confirmation names the record specifically and summarises contents ("{'{n}'} photos · {'{n}'} pin(s) on drawing") so the operative knows exactly what's been sealed.</p>
            </>),
            flag: (<>
              <p><b>Three clear severities with plain English.</b> "Stop work" / "Notify today" / "Just log it". Colour is secondary to the label.</p>
              <p style={{marginTop: 12}}>Voice mic for description — hands are dirty, it's loud, typing is slow.</p>
              <p style={{marginTop: 12}}>Bottom caption names the recipients explicitly: "Goes to James Walsh · Foreman · and Sarah Chen · QS". No ambiguity.</p>
            </>),
            foreman: (<>
              <p><b>Three tabs: Jobs · Team · Ready to send.</b> "Ready to send" has a red dot when there's something waiting — that's the operational priority.</p>
              <p style={{marginTop: 12}}>Each job card shows its type (coloured accent), its record count (big number), and whether it needs action.</p>
            </>),
            send: (<>
              <p><b>The "before you send" checklist</b> is the reassurance — every record has photos, operatives, hashes, batches. Foreman sees this once before signing off.</p>
              <p style={{marginTop: 12}}>Recipient card is prominent — this is the "who am I sending this to" moment.</p>
            </>),
            sent: (<>
              <p><b>Report reference and hash up front.</b> This is the legal trust moment — the foreman can reference BP-2025-0441 in any conversation.</p>
              <p style={{marginTop: 12}}>Two next-steps: look at the full PDF, or back to overview. Nothing else.</p>
            </>),
          }[view]}
        </div>
      </aside>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
