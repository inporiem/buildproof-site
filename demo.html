<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BuildProof v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ================================================================
   TOKENS
   ================================================================ */
:root {
  --ink-1: #0A0A0A;
  --ink-2: #1F1F1F;
  --ink-3: #4A4A4A;
  --ink-4: #8A8A8A;
  --ink-5: #BFBFBF;
  --line:  #E5E5E3;
  --line-2:#D4D4D1;
  --paper: #FAFAF7;
  --paper-2:#F3F2EC;
  --cream: #EFEDE3;

  --signal:    #0D6B6F;
  --signal-2:  #084649;
  --signal-t:  #D8E8E8;

  --go:        #1A7F3C;
  --go-t:      #DCECDD;

  --warn:      #B8571C;
  --warn-t:    #F3E4D0;

  --stop:      #B82020;
  --stop-t:    #F3D6D6;

  --shadow-1: 0 1px 2px rgba(0,0,0,.03), 0 3px 12px rgba(0,0,0,.04);
  --shadow-2: 0 2px 4px rgba(0,0,0,.05), 0 12px 28px rgba(0,0,0,.08);
}

html, body {
  font-family: 'Inter Tight', system-ui, sans-serif;
  background: var(--cream);
  color: var(--ink-1);
  font-feature-settings: "ss01","cv11";
  -webkit-font-smoothing: antialiased;
}

.serif { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01","ss02"; letter-spacing: -0.02em; }
.mono  { font-family: 'JetBrains Mono', monospace; }

/* ================================================================
   LAYOUT
   ================================================================ */
.page {
  display: grid; grid-template-columns: 320px 1fr 340px;
  gap: 0;
  min-height: 100vh;
}
.side {
  padding: 36px 28px;
  border-right: 1px solid var(--line);
  background: var(--paper);
  position: sticky; top: 0; align-self: start;
  max-height: 100vh; overflow-y: auto;
}
.side::-webkit-scrollbar { width: 2px; }
.side::-webkit-scrollbar-thumb { background: var(--line-2); }

.stage {
  display: flex; align-items: center; justify-content: center;
  padding: 40px 24px; position: relative;
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, rgba(13,107,111,.04), transparent 60%),
    var(--cream);
}

.notes {
  padding: 36px 28px;
  border-left: 1px solid var(--line);
  background: var(--paper);
  position: sticky; top: 0; align-self: start;
  max-height: 100vh; overflow-y: auto;
}

/* ================================================================
   PHONE
   ================================================================ */
.phone {
  width: 390px; height: 844px; position: relative;
  background: white;
  border-radius: 48px;
  overflow: hidden;
  box-shadow:
    0 0 0 10px #1a1a1a,
    0 0 0 11px #2d2d2d,
    0 60px 120px -30px rgba(0,0,0,.5),
    0 20px 40px -10px rgba(0,0,0,.3);
}
.notch {
  position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
  width: 124px; height: 34px; background: #0a0a0a; border-radius: 20px; z-index: 50;
}
.home-ind {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 134px; height: 5px; background: rgba(0,0,0,.3); border-radius: 3px; z-index: 50; pointer-events: none;
}
.screen {
  position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
  background: white;
  scrollbar-width: none;
  display: flex; flex-direction: column;
}
.screen::-webkit-scrollbar { display: none; }
.screen-dark { background: #0A0A0A; color: white; }

/* iOS status bar */
.ios-status {
  padding: 14px 28px 0;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 15px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  position: relative; z-index: 10;
}

/* ================================================================
   TYPE
   ================================================================ */
.display {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  line-height: 0.95;
  letter-spacing: -0.03em;
}

.overline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--ink-4);
}

/* Section heading — for headings that introduce a fresh block of content.
   Visually louder than .overline (which is for inline labels). */
.section-heading {
  display: flex; align-items: center; gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--signal);
  margin-bottom: 14px;
}
.section-heading::before {
  content: ''; display: block;
  width: 2px; height: 14px;
  background: var(--signal);
  flex-shrink: 0;
}

.data-num {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-feature-settings: "tnum","lnum";
  letter-spacing: -0.04em;
}

/* ================================================================
   BUTTONS — 64px target minimum
   ================================================================ */
.btn {
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px; width: 100%;
  min-height: 64px; padding: 18px 22px;
  border-radius: 16px; border: none;
  font-family: 'Inter Tight', sans-serif; font-weight: 600; font-size: 17px;
  cursor: pointer; transition: transform .08s ease, filter .12s ease;
  text-align: left;
}
.btn:active { transform: scale(0.985); }
.btn-primary { background: var(--signal); color: white; }
.btn-primary:hover { background: var(--signal-2); }
.btn-secondary { background: white; color: var(--ink-1); border: 1.5px solid var(--line-2); }
.btn-secondary:hover { background: var(--paper-2); }
.btn-go { background: var(--go); color: white; }
.btn-danger { background: var(--stop); color: white; }

.btn-inline {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 999px;
  background: transparent; border: 1.5px solid var(--line-2);
  font-size: 14px; font-weight: 500; cursor: pointer; color: var(--ink-2);
}
.btn-inline:hover { background: var(--paper-2); }

.btn-text {
  background: none; border: none; padding: 8px 0;
  color: var(--ink-3); font-size: 15px; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px;
  font-family: 'Inter Tight', sans-serif; font-weight: 500;
}

/* ================================================================
   MICRO COMPONENTS
   ================================================================ */
.accent-bar { width: 4px; border-radius: 2px; flex-shrink: 0; }
.accent-signal { background: var(--signal); }
.accent-warn   { background: var(--warn); }
.accent-go     { background: var(--go); }
.accent-stop   { background: var(--stop); }

.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-go { background: var(--go); }
.dot-warn { background: var(--warn); }
.dot-stop { background: var(--stop); }
.dot-signal { background: var(--signal); }

.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 999px;
}
.pill-signal { background: var(--signal-t); color: var(--signal-2); }
.pill-warn   { background: var(--warn-t);   color: var(--warn); }
.pill-go     { background: var(--go-t);     color: var(--go); }
.pill-stop   { background: var(--stop-t);   color: var(--stop); }
.pill-ink    { background: var(--paper-2);  color: var(--ink-2); }

.chip-lg {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 14px;
  background: var(--paper-2); border-radius: 999px;
  font-size: 14px; font-weight: 500; color: var(--ink-2);
}

/* Input */
.field {
  width: 100%;
  padding: 18px 20px;
  font-family: 'Inter Tight', sans-serif; font-size: 18px;
  background: var(--paper-2); border: 1.5px solid transparent;
  border-radius: 16px; outline: none;
  transition: all .12s ease;
  color: var(--ink-1);
}
.field:focus, .field.filled { background: white; border-color: var(--signal); box-shadow: 0 0 0 4px var(--signal-t); }
.field-mono { font-family: 'JetBrains Mono', monospace; font-size: 17px; }
.field-lbl {
  font-family: 'JetBrains Mono', monospace; font-size: 11px;
  font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--ink-4); display: block; margin-bottom: 10px;
}

/* ================================================================
   SIDEBAR NAV
   ================================================================ */
.brand {
  display: flex; align-items: baseline; gap: 0;
  padding-bottom: 36px; margin-bottom: 36px;
  border-bottom: 1px solid var(--line);
}
.brand-b { font-family: 'Fraunces', serif; font-weight: 500; font-size: 28px; letter-spacing: -0.03em; }
.brand-p { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-4); margin-left: 10px; letter-spacing: 0.1em; }

.nav-group-hdr {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-4);
  padding: 14px 12px 8px;
}
.nav-item {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 10px 12px;
  background: none; border: none;
  font-family: 'Inter Tight', sans-serif; font-size: 14px; font-weight: 500;
  color: var(--ink-2); cursor: pointer; border-radius: 8px;
  text-align: left;
  transition: background .1s ease;
}
.nav-item:hover { background: var(--paper-2); }
.nav-item.active { background: var(--ink-1); color: white; }
.nav-item.active .nav-id { color: rgba(255,255,255,.5); }
.nav-id {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-4);
  letter-spacing: 0.05em;
}

/* ================================================================
   SCREEN HELPERS
   ================================================================ */
.screen-pad { padding: 22px 26px; }
.screen-pad-sm { padding: 16px 22px; }
.bottom-dock {
  position: sticky; bottom: 0;
  margin-top: auto;
  padding: 18px 22px 30px;
  background: linear-gradient(to top, white 70%, rgba(255,255,255,.95) 90%, rgba(255,255,255,0));
  z-index: 10;
}

/* ================================================================
   SPECIAL — hero card
   ================================================================ */
.card-hero {
  background: white;
  border-radius: 22px;
  padding: 0;
  box-shadow: var(--shadow-2);
  overflow: hidden;
  border: 1px solid var(--line);
}

.ink-link {
  color: var(--signal-2);
  font-weight: 500; font-size: 14px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  background: none; border: none;
  padding: 6px 0;
  font-family: 'Inter Tight', sans-serif;
}

/* ================================================================
   PHOTO MOCK
   ================================================================ */
.photo-box {
  background: #111;
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background-image:
    repeating-linear-gradient(135deg, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 16px);
}
.photo-box-captured {
  background:
    linear-gradient(135deg, #334155 0%, #1e293b 50%, #0f172a 100%);
}
.photo-box-meta {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 10px;
  background: linear-gradient(to top, rgba(0,0,0,.7), transparent);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: rgba(255,255,255,.85);
  display: flex; justify-content: space-between;
}

/* ================================================================
   MOTION
   ================================================================ */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: none; }
}
.fade-up { animation: fade-up .3s cubic-bezier(.2,.9,.3,1) both; }

@keyframes pop {
  0% { transform: scale(.5); opacity: 0; }
  60% { transform: scale(1.08); }
  100% { transform: none; opacity: 1; }
}
.pop { animation: pop .4s cubic-bezier(.2,.9,.3,1) both; }

@keyframes stagger {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: none; }
}
.stagger > * {
  animation: stagger .4s cubic-bezier(.2,.9,.3,1) both;
}
.stagger > *:nth-child(1) { animation-delay: .05s; }
.stagger > *:nth-child(2) { animation-delay: .12s; }
.stagger > *:nth-child(3) { animation-delay: .19s; }
.stagger > *:nth-child(4) { animation-delay: .26s; }
.stagger > *:nth-child(5) { animation-delay: .33s; }
.stagger > *:nth-child(6) { animation-delay: .40s; }

/* Caret blink */
@keyframes blink { 50% { opacity: 0; } }
.caret { display: inline-block; width: 3px; height: 1.1em; background: var(--signal); margin-left: 4px; animation: blink 1s step-end infinite; vertical-align: -0.1em; }

/* Spinner */
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Screen ID badge */
.screen-id {
  position: absolute; top: 22px; right: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--ink-4); letter-spacing: 0.05em;
  background: rgba(0,0,0,.04); padding: 4px 10px;
  border-radius: 999px; z-index: 5;
}
.screen-id.on-dark { background: rgba(255,255,255,.08); color: rgba(255,255,255,.5); }
/* Demo mode — hide the in-phone badge (still rendered, just hidden from view) */
.page.demo-mode .screen-id { display: none; }
.page.demo-mode { grid-template-columns: 1fr; }
.page.demo-mode .stage { padding: 36px 24px 24px; min-height: 100vh; }
.page.demo-mode .notes { display: none; }
/* Subtle external page-code label — sits below the phone in demo mode for reference */
.page-code-ref {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--ink-4);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  opacity: 0.55;
  user-select: all;
  margin-top: 4px;
}
.page-code-ref:hover { opacity: 1; }

/* Tour mode — sits beside the phone in demo mode, hidden on mobile */
.page.tour-on { grid-template-columns: 1fr; }
.page.tour-on .stage {
  padding: 36px 24px 24px;
  min-height: 100vh;
}
.page.tour-on .stage > div {
  display: grid !important;
  grid-template-columns: minmax(0, 410px) minmax(0, 410px);
  gap: 32px;
  align-items: start;
  justify-content: center;
}
.page.tour-on .stage > div > div:first-child { justify-self: end; }

.tour-panel {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 4px 0 0;
  max-width: 380px;
  box-shadow: none;
  align-self: start;
  display: flex;
  flex-direction: column;
  /* Height auto — sizes to content */
}
.tour-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 4px 14px;
  background: transparent;
  border: none;
}
.tour-brand {
  display: flex; align-items: center; gap: 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; font-weight: 700;
  color: var(--ink-4);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.tour-brand-dot {
  width: 6px; height: 6px; border-radius: 3px;
  background: var(--signal-2);
  animation: tour-dot-pulse 2.4s ease-in-out infinite;
}
@keyframes tour-dot-pulse {
  0%, 100% { opacity: 0.9; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.85); }
}
.tour-exit {
  width: 22px; height: 22px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 11px;
  font-size: 15px;
  line-height: 1;
  color: var(--ink-4);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.tour-exit:hover { color: var(--ink-1); border-color: var(--line-2); }

.tour-body {
  padding: 0 4px;
}
.tour-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: var(--ink-4);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.tour-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 12px;
  color: var(--ink-1);
}
.tour-text {
  font-size: 13.5px;
  line-height: 1.55;
  color: var(--ink-2);
  margin-bottom: 16px;
}
.tour-try {
  background: transparent;
  border: none;
  border-left: 2px solid var(--signal-2);
  border-radius: 0;
  padding: 2px 0 2px 12px;
  margin-bottom: 14px;
}
.tour-try-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 700;
  color: var(--signal-2);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.tour-try-text {
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-1);
  line-height: 1.45;
}

.tour-foot {
  padding: 4px 4px 0;
  background: transparent;
  border: none;
  display: flex; align-items: center; gap: 12px;
}
.tour-foot-text {
  font-size: 10.5px;
  color: var(--ink-4);
  line-height: 1.4;
}
.tour-restart {
  background: transparent;
  border: none;
  padding: 0;
  font-family: 'Inter Tight', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-3);
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: var(--line-2);
  text-underline-offset: 3px;
}
.tour-restart:hover { color: var(--ink-1); text-decoration-color: var(--ink-3); }

/* ================================================================
   MOBILE RESPONSIVE
   On screens <900px: hide side + notes panels, make stage full-width.
   On screens <600px: strip the phone frame entirely, make screen
   fill viewport so the prototype is usable on a real phone.
   ================================================================ */
@media (max-width: 900px) {
  .page {
    grid-template-columns: 1fr;
  }
  .side, .notes {
    display: none;
  }
  .stage {
    padding: 24px 16px;
    min-height: 100vh;
  }
  /* Tour mode legacy — keep working */
  .page.tour-on .stage > div {
    display: flex !important;
    grid-template-columns: none;
  }
  .tour-panel { display: none; }
}

@media (max-width: 600px) {
  html, body {
    overflow-x: hidden;
  }
  /* Small top padding so the phone "tab" sits below browser chrome with a visible curve */
  .stage {
    padding: 12px 0 0;
    background: var(--cream);
    display: block;
  }
  /* Force the flex wrapper divs around .phone to fill width and stretch children — they
     have inline alignItems:'center' which otherwise shrinks the .phone to content width. */
  .stage > div,
  .stage > div > div {
    width: 100% !important;
    align-items: stretch !important;
  }
  /* Phone fills viewport width but keeps a rounded "phone-tab" silhouette on all corners */
  .phone {
    width: 100%;
    max-width: 100%;
    height: auto;
    min-height: calc(100vh - 24px);
    border-radius: 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    background: var(--paper);
    margin: 0 auto 12px;
    overflow: hidden;
  }
  .notch, .home-ind {
    display: none;
  }
  .screen {
    position: relative;
    inset: auto;
    width: 100%;
    min-height: 100vh;
    border-radius: 24px;
    overflow-x: hidden;
  }
  /* Hide the iOS faux-status-bar — the user has a real one */
  .ios-status {
    display: none;
  }
  /* Hide demo-only debug labels */
  .screen-id, .page-code-ref {
    display: none !important;
  }
}

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

/* ================================================================
   TINY ICONS — stroke-based, line-consistent
   ================================================================ */
const Icon = {
  Arrow:  ({s=22,...p}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14M13 6l6 6-6 6"/></svg>,
  Back:   ({s=22,...p}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M19 12H5M11 18l-6-6 6-6"/></svg>,
  Close:  ({s=22,...p}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M18 6L6 18M6 6l12 12"/></svg>,
  Check:  ({s=22,...p}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12l5 5L20 7"/></svg>,
  Camera: ({s=22,...p}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M9 5l1.5-2h3L15 5h3a3 3 0 013 3v9a3 3 0 01-3 3H6a3 3 0 01-3-3V8a3 3 0 013-3h3z"/><circle cx="12" cy="13" r="4"/></svg>,

      )}
    </div>
  );
};


/* ================================================================
   01b  JOB SETUP  (W2)  — fast-path project creation
   Single screen, ~60 seconds: type, name, address, units (count
   or area labels depending on type), recipient. Persists as a
   userProject with units pre-generated. After Create the user
   lands on the appropriate project home (NewBuildView / RemedialView /
   OwnJobView / simple) where they tap a unit to define elements
   and start capturing.
   ================================================================ */
const JobSetup = ({ onBack, onCreate }) => {
  const [workType, setWorkType] = useState(null);
  const [name, setName] = useState('');
  const [address, setAddress] = useState('');

  // Unit definition — the shape of these depends on workType.
  // For new-build / remedial: array of { id, label } where labels are editable
  // For whole-property: array of { id, label } for areas (Kitchen, Roof, etc.)
  // For day-works / other: empty (no units, single container)
  const [units, setUnits] = useState([]);

  // For multi-unit setup: the user enters a count + numbering scheme,
  // we generate the unit list, and they can then rename each.
  const [unitCount, setUnitCount] = useState('');
  const [numberingStart, setNumberingStart] = useState('1');
  const [unitLabel, setUnitLabel] = useState('Flat');  // Flat / Plot / House / Unit

  // For whole-property: free-text input plus quick-add chips
  const [areaInput, setAreaInput] = useState('');

  // Recipient
  const [recipientType, setRecipientType] = useState(null);
  const [selectedContactId, setSelectedContactId] = useState(null);
  const [newRecipientName, setNewRecipientName] = useState('');
  const [newRecipientEmail, setNewRecipientEmail] = useState('');

  // Type definitions — drives downstream view
  const types = [
    { id: 'newbuild', label: 'New build', hint: 'Multiple units / plots, programmed', viewType: 'newbuild', wantsUnits: true, unitNoun: 'flat' },
    { id: 'remedial', label: 'Remedial / multi-unit', hint: 'Defect work across multiple flats', viewType: 'remedial', wantsUnits: true, unitNoun: 'flat' },
    { id: 'whole-property', label: 'Whole-property work', hint: 'One home — split into rooms or areas', viewType: 'own', wantsAreas: true },
    { id: 'day-works', label: 'Day works / one-off', hint: 'Quick repair, no structure needed', viewType: 'simple' },
  ];
  const selectedType = types.find(t => t.id === workType);

  // Generate units from count + numbering scheme. User can rename after.
  const generateUnits = () => {
    const n = parseInt(unitCount, 10);
    if (!n || n < 1 || n > 50) return;
    const start = parseInt(numberingStart, 10) || 1;
    const generated = Array.from({length: n}, (_, i) => ({
      id: `u-${Math.random().toString(36).substr(2, 6)}`,
      label: `${unitLabel} ${start + i}`,
    }));
    setUnits(generated);
  };

  // Rename a specific unit
  const renameUnit = (id, newLabel) => setUnits(prev => prev.map(u => u.id === id ? { ...u, label: newLabel } : u));
  const removeUnit = (id) => setUnits(prev => prev.filter(u => u.id !== id));

  // Add an area for whole-property
  const addArea = (label) => {
    const trimmed = label.trim();
    if (!trimmed) return;
    if (units.find(u => u.label.toLowerCase() === trimmed.toLowerCase())) return;
    setUnits(prev => [...prev, { id: `a-${Math.random().toString(36).substr(2, 6)}`, label: trimmed }]);
    setAreaInput('');
  };
  const commonAreas = ['Kitchen', 'Bathroom', 'Living room', 'Bedroom 1', 'Bedroom 2', 'Hallway', 'Roof', 'Extension', 'Garden', 'Loft', 'Garage'];

  // Recipient
  const knownContacts = [
    { id: 'sarah', name: 'Sarah Chen', org: 'Crest Nicholson', role: 'QS', email: 'sarah.chen@crestnicholson.co.uk' },
    { id: 'djones', name: 'David Jones', org: 'Crest Nicholson', role: 'Site Manager', email: 'd.jones@crestnicholson.co.uk' },
    { id: 'emma', name: 'Emma Holroyd', org: 'Homeowner', role: 'Client', email: 'emma.holroyd@gmail.com' },
  ];
  const resolveRecipient = () => {
    if (recipientType === 'contact' && selectedContactId) {
      const c = knownContacts.find(x => x.id === selectedContactId);
      return c ? { name: c.name, org: c.org, role: c.role, email: c.email } : null;
    }
    if (recipientType === 'self') return { name: 'Self-issued', org: 'Self', role: 'Records for your archive', email: 'self' };
    if (recipientType === 'new' && newRecipientName.trim() && newRecipientEmail.trim().includes('@')) {
      return { name: newRecipientName.trim(), org: '', role: 'Client', email: newRecipientEmail.trim() };
    }
    return null;
  };
  const recipient = resolveRecipient();

  // Validation — required fields depend on type
  const wantsUnits = selectedType && (selectedType.wantsUnits || selectedType.wantsAreas);
  const canCreate =
    name.trim() && workType && address.trim() && recipient &&
    (!wantsUnits || units.length > 0);

  return (
    <div className="screen fade-up">
      <Status/>
      <div className="screen-id">W2 · New job</div>

      <div style={{padding: '14px 22px 0'}}>
        <button onClick={onBack} className="btn-text" style={{display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 4px', marginLeft: -4}}>
          <Icon.Back s={18}/><span style={{fontSize: 14}}>Home</span>
        </button>
      </div>

      <div style={{padding: '12px 28px 0'}}>
        <div className="section-heading">New job</div>
        <h1 className="display" style={{fontSize: 36, lineHeight: 1.05, marginTop: 2}}>What are you<br/>working on?</h1>
        <div style={{marginTop: 8, fontSize: 13, color: 'var(--ink-3)'}}>The basics now. Drawings, crew and elements get added once it's set up.</div>
      </div>

      {/* Type chip */}
      <div style={{padding: '24px 22px 0'}}>
        <div className="section-heading">Kind of work</div>
        <div style={{display: 'flex', flexDirection: 'column', gap: 6}}>
          {types.map(t => (
            <button key={t.id} onClick={() => {
              setWorkType(t.id);
              // Reset units when changing type
              setUnits([]);
              setUnitCount('');
              if (t.unitNoun) setUnitLabel(t.unitNoun.charAt(0).toUpperCase() + t.unitNoun.slice(1));
            }} style={{
              display: 'flex', alignItems: 'flex-start', gap: 10,
              padding: '12px 14px',
              background: workType === t.id ? 'var(--signal-t)' : 'white',
              border: workType === t.id ? '1.5px solid var(--signal-2)' : '1px solid var(--line)',
              borderRadius: 10,
              cursor: 'pointer', textAlign: 'left',
              fontFamily: 'Inter Tight',
            }}>
              <div style={{
                width: 16, height: 16, borderRadius: 8,
                border: workType === t.id ? '5px solid var(--signal-2)' : '1.5px solid var(--ink-4)',
                background: workType === t.id ? 'white' : 'transparent',
                flexShrink: 0, marginTop: 2,
              }}></div>
              <div style={{flex: 1, minWidth: 0}}>
                <div style={{fontSize: 13, color: 'var(--ink-1)', fontWeight: 600}}>{t.label}</div>
                <div style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 2}}>{t.hint}</div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* Name */}
      <div style={{padding: '20px 22px 0'}}>
        <div className="section-heading">Name this job</div>
        <input type="text" value={name} onChange={e => setName(e.target.value)}
          placeholder={selectedType && selectedType.id === 'newbuild' ? 'e.g. Riverside Block A' : selectedType && selectedType.id === 'remedial' ? 'e.g. Maple Court fire-stopping' : 'e.g. 47 Park Road extension'}
          style={{width: '100%', padding: '12px 14px', border: '1.5px solid var(--line)', borderRadius: 10, fontSize: 14, fontFamily: 'Inter Tight', background: 'white'}}/>
      </div>

      {/* Address */}
      <div style={{padding: '20px 22px 0'}}>
        <div className="section-heading">Site address</div>
        <input type="text" value={address} onChange={e => setAddress(e.target.value)}
          placeholder="e.g. 47 Park Road, Bristol BS6 5AA"
          style={{width: '100%', padding: '12px 14px', border: '1.5px solid var(--line)', borderRadius: 10, fontSize: 13, fontFamily: 'Inter Tight', background: 'white'}}/>
      </div>

      {/* Multi-unit builder — newbuild / remedial */}
      {selectedType && selectedType.wantsUnits && (
        <div style={{padding: '20px 22px 0'}}>
          <div className="section-heading">How many units</div>
          {units.length === 0 ? (
            <div style={{padding: '16px 18px', background: 'white', border: '1px solid var(--line)', borderRadius: 12}}>
              <div style={{display: 'grid', gridTemplateColumns: '70px 1fr 90px', gap: 8, alignItems: 'center'}}>
                <input type="number" value={unitCount} onChange={e => setUnitCount(e.target.value)}
                  placeholder="5" min="1" max="50"
                  style={{padding: '10px 12px', border: '1.5px solid var(--line)', borderRadius: 8, fontSize: 14, fontFamily: 'Inter Tight', background: 'white', textAlign: 'center'}}/>
                <select value={unitLabel} onChange={e => setUnitLabel(e.target.value)}
                  style={{padding: '10px 12px', border: '1.5px solid var(--line)', borderRadius: 8, fontSize: 13, fontFamily: 'Inter Tight', background: 'white'}}>
                  <option value="Flat">Flat</option>
                  <option value="Plot">Plot</option>
                  <option value="House">House</option>
                  <option value="Unit">Unit</option>
                  <option value="Apartment">Apartment</option>
                </select>
                <input type="text" value={numberingStart} onChange={e => setNumberingStart(e.target.value)}
                  placeholder="from"
                  style={{padding: '10px 12px', border: '1.5px solid var(--line)', borderRadius: 8, fontSize: 13, fontFamily: 'Inter Tight', background: 'white', textAlign: 'center'}}/>
              </div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', marginTop: 8, letterSpacing: 0.04}}>
                {unitCount && parseInt(unitCount, 10) > 0 && `Will create ${unitLabel} ${numberingStart || 1} through ${unitLabel} ${(parseInt(numberingStart, 10) || 1) + parseInt(unitCount, 10) - 1}. You can rename each individually after.`}
              </div>
              <button onClick={generateUnits}
                disabled={!unitCount || parseInt(unitCount, 10) < 1}
                style={{
                  width: '100%', marginTop: 12, padding: '10px',
                  background: unitCount && parseInt(unitCount, 10) >= 1 ? 'var(--ink-1)' : 'var(--paper-2)',
                  color: unitCount && parseInt(unitCount, 10) >= 1 ? 'white' : 'var(--ink-4)',
                  border: 'none', borderRadius: 8,
                  fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 13,
                  cursor: unitCount ? 'pointer' : 'not-allowed',
                }}>Generate {unitCount || ''} {unitLabel}{unitCount && parseInt(unitCount, 10) === 1 ? '' : 's'}</button>
            </div>
          ) : (
            <div>
              <div style={{background: 'white', border: '1px solid var(--line)', borderRadius: 12, overflow: 'hidden'}}>
                {units.map((u, i) => (
                  <div key={u.id} style={{display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', borderBottom: i < units.length - 1 ? '1px solid var(--line)' : 'none'}}>
                    <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', width: 28, flexShrink: 0}}>{i + 1}.</div>
                    <input type="text" value={u.label} onChange={e => renameUnit(u.id, e.target.value)}
                      style={{flex: 1, padding: '6px 8px', border: 'none', fontSize: 13, fontFamily: 'Inter Tight', background: 'transparent', outline: 'none', color: 'var(--ink-1)'}}/>
                    <button onClick={() => removeUnit(u.id)} style={{background: 'transparent', border: 'none', color: 'var(--ink-4)', cursor: 'pointer', fontSize: 16, padding: '4px 8px'}}>×</button>
                  </div>
                ))}
              </div>
              <div style={{display: 'flex', gap: 8, marginTop: 10}}>
                <button onClick={() => setUnits([])} style={{padding: '7px 10px', background: 'transparent', border: '1.5px solid var(--line-2)', borderRadius: 8, fontFamily: 'Inter Tight', fontSize: 12, color: 'var(--ink-3)', cursor: 'pointer'}}>Reset</button>
                <button onClick={() => setUnits([...units, { id: `u-${Math.random().toString(36).substr(2, 6)}`, label: `${unitLabel} ${units.length + 1}` }])} style={{padding: '7px 10px', background: 'transparent', border: '1.5px solid var(--line-2)', borderRadius: 8, fontFamily: 'Inter Tight', fontSize: 12, color: 'var(--ink-2)', fontWeight: 600, cursor: 'pointer'}}>+ Add another</button>
              </div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', marginTop: 6, letterSpacing: 0.04}}>Tap any name to rename. Each unit becomes its own capture surface.</div>
            </div>
          )}
        </div>
      )}

      {/* Whole-property areas builder */}
      {selectedType && selectedType.wantsAreas && (
        <div style={{padding: '20px 22px 0'}}>
          <div className="section-heading">Areas of the property</div>
          <div style={{padding: '14px 16px', background: 'white', border: '1px solid var(--line)', borderRadius: 12}}>
            {/* Common-area chips for fast adding */}
            <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.08, fontWeight: 700, marginBottom: 8}}>Tap to add common areas</div>
            <div style={{display: 'flex', flexWrap: 'wrap', gap: 5}}>
              {commonAreas.filter(c => !units.find(u => u.label.toLowerCase() === c.toLowerCase())).map(c => (
                <button key={c} onClick={() => addArea(c)} style={{
                  padding: '5px 10px',
                  background: 'var(--paper-2)', color: 'var(--ink-2)',
                  border: '1px solid var(--line)', borderRadius: 999,
                  fontSize: 11, cursor: 'pointer', fontFamily: 'Inter Tight',
                }}>+ {c}</button>
              ))}
            </div>
            {/* Free-text input */}
            <div style={{display: 'flex', gap: 6, marginTop: 12}}>
              <input type="text" value={areaInput} onChange={e => setAreaInput(e.target.value)}
                onKeyPress={e => { if (e.key === 'Enter') addArea(areaInput); }}
                placeholder="Or type your own — Front room, Annexe, etc."
                style={{flex: 1, padding: '10px 12px', border: '1.5px solid var(--line)', borderRadius: 8, fontSize: 13, fontFamily: 'Inter Tight', background: 'white'}}/>
              <button onClick={() => addArea(areaInput)}
                disabled={!areaInput.trim()}
                style={{
                  padding: '10px 14px',
                  background: areaInput.trim() ? 'var(--ink-1)' : 'var(--paper-2)',
                  color: areaInput.trim() ? 'white' : 'var(--ink-4)',
                  border: 'none', borderRadius: 8,
                  fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 13,
                  cursor: areaInput.trim() ? 'pointer' : 'not-allowed',
                }}>Add</button>
            </div>
          </div>

          {/* Selected areas list */}
          {units.length > 0 && (
            <div style={{marginTop: 12}}>
              <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.08, fontWeight: 700, marginBottom: 6}}>Your areas ({units.length})</div>
              <div style={{background: 'white', border: '1px solid var(--line)', borderRadius: 12, overflow: 'hidden'}}>
                {units.map((u, i) => (
                  <div key={u.id} style={{display: 'flex', alignItems: 'center', gap: 8, padding: '10px 12px', borderBottom: i < units.length - 1 ? '1px solid var(--line)' : 'none'}}>
                    <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', width: 20, flexShrink: 0}}>{i + 1}</div>
                    <input type="text" value={u.label} onChange={e => renameUnit(u.id, e.target.value)}
                      style={{flex: 1, padding: '6px 8px', border: 'none', fontSize: 13, fontFamily: 'Inter Tight', background: 'transparent', outline: 'none', color: 'var(--ink-1)'}}/>
                    <button onClick={() => removeUnit(u.id)} style={{background: 'transparent', border: 'none', color: 'var(--ink-4)', cursor: 'pointer', fontSize: 16, padding: '4px 8px'}}>×</button>
                  </div>
                ))}
              </div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', marginTop: 6, letterSpacing: 0.04}}>Tap any name to rename. Each area becomes a distinct capture surface.</div>
            </div>
          )}
        </div>
      )}

      {/* Recipient */}
      {workType && (
        <div style={{padding: '20px 22px 0'}}>
          <div className="section-heading">Who's paying</div>
          <div style={{display: 'flex', flexDirection: 'column', gap: 6}}>
            {knownContacts.map(c => (
              <button key={c.id} onClick={() => { setRecipientType('contact'); setSelectedContactId(c.id); }} style={{
                display: 'flex', alignItems: 'center', gap: 10,
                padding: '12px 14px',
                background: recipientType === 'contact' && selectedContactId === c.id ? 'var(--signal-t)' : 'white',
                border: recipientType === 'contact' && selectedContactId === c.id ? '1.5px solid var(--signal-2)' : '1px solid var(--line)',
                borderRadius: 10,
                cursor: 'pointer', textAlign: 'left',
                fontFamily: 'Inter Tight',
              }}>
                <div style={{
                  width: 16, height: 16, borderRadius: 8,
                  border: recipientType === 'contact' && selectedContactId === c.id ? '5px solid var(--signal-2)' : '1.5px solid var(--ink-4)',
                  background: recipientType === 'contact' && selectedContactId === c.id ? 'white' : 'transparent',
                  flexShrink: 0,
                }}></div>
                <div style={{flex: 1, minWidth: 0}}>
                  <div style={{fontSize: 13, color: 'var(--ink-1)', fontWeight: 600}}>{c.name}</div>
                  <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2}}>{c.role} · {c.org}</div>
                </div>
              </button>
            ))}
            <button onClick={() => setRecipientType('self')} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '12px 14px',
              background: recipientType === 'self' ? 'var(--signal-t)' : 'white',
              border: recipientType === 'self' ? '1.5px solid var(--signal-2)' : '1px solid var(--line)',
              borderRadius: 10,
              cursor: 'pointer', textAlign: 'left',
              fontFamily: 'Inter Tight',
            }}>
              <div style={{
                width: 16, height: 16, borderRadius: 8,
                border: recipientType === 'self' ? '5px solid var(--signal-2)' : '1.5px solid var(--ink-4)',
                background: recipientType === 'self' ? 'white' : 'transparent',
                flexShrink: 0,
              }}></div>
              <div style={{flex: 1}}>
                <div style={{fontSize: 13, color: 'var(--ink-1)', fontWeight: 600}}>Self-issued</div>
                <div style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 2}}>For your portfolio · no external recipient</div>
              </div>
            </button>
            <div style={{padding: '12px 14px', background: 'white', border: recipientType === 'new' ? '1.5px solid var(--signal-2)' : '1px solid var(--line)', borderRadius: 10}} onClick={() => setRecipientType('new')}>
              <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.08, fontWeight: 700, marginBottom: 6}}>Or someone new</div>
              <input type="text" value={newRecipientName} onChange={e => { setRecipientType('new'); setNewRecipientName(e.target.value); }} placeholder="Their name"
                style={{width: '100%', padding: '4px 0', border: 'none', fontSize: 13, fontFamily: 'Inter Tight', background: 'transparent', outline: 'none'}}/>
              <input type="email" value={newRecipientEmail} onChange={e => { setRecipientType('new'); setNewRecipientEmail(e.target.value); }} placeholder="email@example.com"
                style={{width: '100%', padding: '4px 0', border: 'none', borderTop: '1px solid var(--line)', marginTop: 4, fontSize: 12, fontFamily: 'JetBrains Mono', background: 'transparent', outline: 'none'}}/>
            </div>
          </div>
        </div>
      )}

      {/* Submit */}
      <div style={{padding: '32px 22px 40px'}}>
        <button
          onClick={() => canCreate && onCreate({
            id: `userp-${Math.random().toString(36).substr(2, 7)}`,
            name: name.trim(),
            workType: selectedType.viewType,
            workTypeLabel: selectedType.label,
            address: address.trim(),
            units: [...units],
            recipient,
            composer: 'Dave Patel',
            composerRole: selectedType.viewType === 'own' ? 'builder' : 'operative',
            createdAt: new Date().toISOString().slice(0, 10),
          })}
          disabled={!canCreate}
          className={`btn ${canCreate ? 'btn-primary' : ''}`}
          style={!canCreate ? { background: 'var(--paper-2)', color: 'var(--ink-4)', cursor: 'not-allowed' } : undefined}
        >
          <span>Create job</span>
          <Icon.Arrow/>
        </button>
        <div style={{textAlign: 'center', fontSize: 11, color: 'var(--ink-4)', marginTop: 10, fontFamily: 'Inter Tight'}}>
          Once created you'll add drawings, define elements, and start capturing per unit.
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   01d-2  YOUR CAPTURES  (YC)  — Dave's unsent records grouped by project,
   plus draft packs in progress. Dave bundles records into packs here.
   ================================================================ */
const YourCaptures = ({ onBack, records, packs, onComposePack, onOpenPack }) => {
  // Records categorisation:
  //   sent   = in any sent/approved pack — hidden from this screen (those are done)
  //   draft  = in a draft pack — visible only via the "In progress" pack list
  //   loose  = not in any pack — these are what's ready to be bundled
  const sentRecordIds = new Set(packs.filter(p => p.status === 'sent' || p.status === 'approved').flatMap(p => p.recordIds));
  const draftRecordIds = new Set(packs.filter(p => p.status === 'draft').flatMap(p => p.recordIds));
  const loose = records.filter(r => !sentRecordIds.has(r.id) && !draftRecordIds.has(r.id));

  // Group loose records by project
  const byProject = loose.reduce((acc, r) => {
    (acc[r.projectId] = acc[r.projectId] || []).push(r);
    return acc;
  }, {});
  const draftPacks = packs.filter(p => p.status === 'draft' && p.composer === 'Dave Patel');

  return (

/* ================================================================
   01d-3  COMPOSE PACK  (CP)  — Dave (or foreman) builds a pack from
   unsent records. Pick records, name the stage, confirm recipient.
   ================================================================ */
const ComposePack = ({ onBack, onSubmit, onDeleteDraft,
                      projectId, existingPack = null,
                      records, packs }) => {
  const proj = (typeof PROJECT_META !== 'undefined' && PROJECT_META[projectId]) || { name: projectId, workType: 'newbuild' };
  const sentRecordIds = new Set(packs.filter(p => p.status === 'sent' || p.status === 'approved').flatMap(p => p.recordIds));
  // Records eligible: unsent on this project, or already in the existing pack
  const draftIdSet = existingPack ? new Set(existingPack.recordIds) : new Set();
  const eligible = records.filter(r => r.projectId === projectId && (!sentRecordIds.has(r.id) || draftIdSet.has(r.id)));

  // State — what's selected for inclusion
  const [packName, setPackName] = useState(existingPack ? existingPack.name : '');
  const [selected, setSelected] = useState(() => new Set(existingPack ? existingPack.recordIds : eligible.map(r => r.id)));
  const [recipientEmail, setRecipientEmail] = useState(existingPack ? existingPack.recipient.email : (proj.invitedBy ? proj.invitedBy.email : ''));

  const knownAccounts = {
    'sarah.chen@crestnicholson.co.uk': { name: 'Sarah Chen', org: 'Crest Nicholson', role: 'QS · Special Projects' },
    'james.walsh@timbertech.co.uk':    { name: 'James Walsh', org: 'TimberTech', role: 'Foreman' },
    'emma.holroyd@gmail.com':          { name: 'Emma Holroyd', org: 'Homeowner', role: 'Client' },
    'd.jones@crestnicholson.co.uk':    { name: 'David Jones', org: 'Crest Nicholson', role: 'Site Manager' },
  };
  const recipientAccount = knownAccounts[recipientEmail.toLowerCase()];

  const toggle = (id) => setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const toggleAll = () => setSelected(selected.size === eligible.length ? new Set() : new Set(eligible.map(r => r.id)));

  const canSubmit = packName.trim().length > 0 && selected.size > 0 && recipientAccount;

  // Suggest stage names based on project type
  const suggestions = proj.workType === 'remedial'
    ? ['Cavity barriers · Flats 501-504', 'Fire-stop seals · risers', 'Intumescent collars · soil pipes']
    : proj.workType === 'own'
    ? ['Stage 3 — First fix', 'Stage 4 — Second fix', 'Stage 5 — Plastering']
    : ['Plot 204 · Floor 1 fire stopping', 'Plot 205 · Floor 1 fire stopping', 'Common areas · Lobby GF'];

  return (
    <div className="screen fade-up">
      <Status/>
      <div className="screen-id">CP · Compose pack</div>

      <div style={{padding: '14px 22px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
        <button onClick={onBack} className="btn-text" style={{display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 4px', marginLeft: -4}}>
          <Icon.Back s={18}/><span style={{fontSize: 14}}>Captures</span>
        </button>
        {existingPack && onDeleteDraft && (
          <button onClick={() => { if (confirm('Delete this draft pack? Records stay in your captures.')) { onDeleteDraft(existingPack.id); } }} style={{
            background: 'transparent', border: 'none', padding: '6px 8px',
            fontSize: 11, color: 'var(--ink-4)', cursor: 'pointer',
            fontFamily: 'Inter Tight',
          }}>Delete draft</button>
        )}
      </div>

      <div style={{padding: '12px 28px 0'}}>
        <div className="section-heading">{existingPack ? 'Edit draft pack' : 'New pack'}</div>
        <h1 className="display" style={{fontSize: 32, lineHeight: 1.05, marginTop: 2}}>{proj.name}</h1>
        <div style={{marginTop: 6, fontSize: 13, color: 'var(--ink-3)'}}>Bundle records into a pack to send. Each pack is a sealed evidence delivery — usually one per stage or invoice cycle.</div>
      </div>

      {/* Pack name */}
      <div style={{padding: '24px 22px 0'}}>
        <div className="section-heading">Pack name</div>
        <input type="text" value={packName} onChange={e => setPackName(e.target.value)}
          placeholder="e.g. Stage 3 — First fix"
          style={{
            width: '100%', padding: '12px 14px',
            border: '1.5px solid var(--line)', borderRadius: 10,
            fontSize: 14, fontFamily: 'Inter Tight',
            background: 'white',
          }}/>
        {!packName && (
          <div style={{display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 10}}>
            {suggestions.map(s => (
              <button key={s} onClick={() => setPackName(s)} style={{
                padding: '5px 10px',
                background: 'var(--paper-2)', color: 'var(--ink-2)',
                border: '1px solid var(--line)', borderRadius: 999,
                fontSize: 11, cursor: 'pointer', fontFamily: 'Inter Tight',
              }}>{s}</button>
            ))}
          </div>
        )}
      </div>

      {/* Records picker */}
      <div style={{padding: '24px 22px 0'}}>
        <div style={{display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 8}}>
          <div className="section-heading" style={{margin: 0}}>What's in this pack</div>
          <button onClick={toggleAll} style={{
            background: 'transparent', border: 'none', padding: 0,
            fontSize: 11, color: 'var(--signal-2)', cursor: 'pointer',
            fontFamily: 'Inter Tight', fontWeight: 600,
          }}>{selected.size === eligible.length ? 'Deselect all' : 'Select all'}</button>
        </div>
        <div style={{background: 'white', border: '1px solid var(--line)', borderRadius: 12, overflow: 'hidden'}}>
          {eligible.length === 0 && (
            <div style={{padding: 20, fontSize: 13, color: 'var(--ink-3)', textAlign: 'center'}}>No unsent records on this project.</div>
          )}
          {eligible.map((r, i) => (
            <button key={r.id} onClick={() => toggle(r.id)} style={{
              width: '100%',
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '12px 14px',
              background: selected.has(r.id) ? 'var(--signal-t)' : 'transparent',
              border: 'none',
              borderBottom: i < eligible.length - 1 ? '1px solid var(--line)' : 'none',
              cursor: 'pointer', textAlign: 'left',
              fontFamily: 'Inter Tight',
            }}>
              <div style={{
                width: 18, height: 18, borderRadius: 4,
                border: selected.has(r.id) ? '2px solid var(--signal-2)' : '1.5px solid var(--ink-4)',
                background: selected.has(r.id) ? 'var(--signal-2)' : 'transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                flexShrink: 0,
              }}>
                {selected.has(r.id) && <Icon.Check s={11} style={{color: 'white'}}/>}
              </div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', width: 56, flexShrink: 0}}>{r.date.slice(5).replace('-', '/')}</div>
              <div style={{flex: 1, minWidth: 0}}>
                <div style={{fontSize: 12, color: 'var(--ink-1)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>{r.element}</div>
                <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', marginTop: 2}}>{typeof r.location === 'string' && /^\d+$/.test(r.location) ? `Flat ${r.location}` : r.location}{r.si ? ` · ${r.si}` : ''}</div>
              </div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', flexShrink: 0}}>{r.photoCount} ph</div>
            </button>
          ))}
        </div>
        <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)', marginTop: 6, textAlign: 'right', letterSpacing: 0.04}}>
          {selected.size} of {eligible.length} selected
        </div>
      </div>

      {/* Recipient */}
      <div style={{padding: '24px 22px 0'}}>
        <div className="section-heading">Sending to</div>
        <input type="email" value={recipientEmail} onChange={e => setRecipientEmail(e.target.value)}
          placeholder="recipient@example.com"
          style={{
            width: '100%', padding: '12px 14px',
            border: '1.5px solid var(--line)', borderRadius: 10,
            fontSize: 13, fontFamily: 'JetBrains Mono',
            background: 'white',
          }}/>
        {recipientAccount ? (
          <div style={{marginTop: 8, padding: '10px 14px', background: 'var(--go-t)', borderRadius: 10, display: 'flex', alignItems: 'center', gap: 10}}>
            <Icon.Check s={14} style={{color: 'var(--go)', flexShrink: 0}}/>
            <div style={{flex: 1, minWidth: 0}}>
              <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink-1)'}}>{recipientAccount.name}</div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2}}>{recipientAccount.role} · {recipientAccount.org}</div>
            </div>
            <span className="mono" style={{fontSize: 9, fontWeight: 700, color: 'var(--go)', letterSpacing: 0.06, textTransform: 'uppercase'}}>BuildProof</span>
          </div>
        ) : recipientEmail.includes('@') && (
          <div style={{marginTop: 8, padding: '10px 14px', background: 'var(--paper-2)', borderRadius: 10, fontSize: 12, color: 'var(--ink-3)'}}>
            New recipient — they'll get an email link. They can sign up to BuildProof to add this pack to their building passport.
          </div>
        )}
      </div>

      {/* Submit */}
      <div style={{padding: '32px 22px 40px'}}>
        {proj.workType === 'own' ? (
          // Own job: builder is also the foreman, so offer to send directly.
          // "Save as draft" is the secondary affordance for "I'm not done composing yet."
          <>
            <button
              onClick={() => canSubmit && onSubmit({
                id: existingPack ? existingPack.id : `pack-${Math.random().toString(36).substr(2, 9)}`,
                projectId,
                name: packName.trim(),
                recordIds: [...selected],
                recipient: recipientAccount ? { ...recipientAccount, email: recipientEmail } : { name: 'New recipient', org: '', role: '', email: recipientEmail },
                composer: 'Dave Patel',
                composerRole: 'builder',
                status: 'draft',
                dateCreated: new Date().toISOString().slice(0, 10),
              }, /* sendNow */ true)}
              disabled={!canSubmit}
              className={`btn ${canSubmit ? 'btn-primary' : ''}`}
              style={!canSubmit ? {
                background: 'var(--paper-2)', color: 'var(--ink-4)', cursor: 'not-allowed',
              } : undefined}
            >
              <span>Send to {recipientAccount ? recipientAccount.name.split(' ')[0] : 'recipient'}</span>
              <Icon.Arrow/>
            </button>
            <button
              onClick={() => canSubmit && onSubmit({
                id: existingPack ? existingPack.id : `pack-${Math.random().toString(36).substr(2, 9)}`,
                projectId,
                name: packName.trim(),
                recordIds: [...selected],
                recipient: recipientAccount ? { ...recipientAccount, email: recipientEmail } : { name: 'New recipient', org: '', role: '', email: recipientEmail },
                composer: 'Dave Patel',
                composerRole: 'builder',
                status: 'draft',
                dateCreated: new Date().toISOString().slice(0, 10),
              }, /* sendNow */ false)}
              disabled={!canSubmit}
              className="btn btn-secondary"
              style={{marginTop: 8, ...(!canSubmit ? { background: 'var(--paper-2)', color: 'var(--ink-4)', cursor: 'not-allowed', borderColor: 'transparent' } : {})}}
            >
              <span>{existingPack ? 'Save draft' : 'Save as draft'}</span>
            </button>
            <div style={{marginTop: 10, fontSize: 11, color: 'var(--ink-4)', textAlign: 'center', lineHeight: 1.5}}>
              On your own job, you compose and send the pack yourself. Drafts let you keep adding records before you send.
            </div>
          </>
        ) : (
          // Crew job: operative drafts a pack, foreman reviews and sends.
          <>
            <button
              onClick={() => canSubmit && onSubmit({
                id: existingPack ? existingPack.id : `pack-${Math.random().toString(36).substr(2, 9)}`,
                projectId,
                name: packName.trim(),
                recordIds: [...selected],
                recipient: recipientAccount ? { ...recipientAccount, email: recipientEmail } : { name: 'New recipient', org: '', role: '', email: recipientEmail },
                composer: 'Dave Patel',
                composerRole: 'operative',
                status: 'draft',
                dateCreated: new Date().toISOString().slice(0, 10),
              }, /* sendNow */ false)}
              disabled={!canSubmit}
              className={`btn ${canSubmit ? 'btn-primary' : ''}`}
              style={!canSubmit ? {
                background: 'var(--paper-2)', color: 'var(--ink-4)', cursor: 'not-allowed',
              } : undefined}
            >
              <span>{existingPack ? 'Save draft' : 'Submit to foreman'}</span>
              <Icon.Arrow/>
            </button>
            <div style={{marginTop: 10, fontSize: 11, color: 'var(--ink-4)', textAlign: 'center', lineHeight: 1.5}}>
              Saved as a draft. Your foreman reviews and forwards to the recipient.
            </div>
          </>
        )}
      </div>
    </div>
  );
};

const buildDreyerRegister = () => {
  const register = {};
  DREYER_APARTMENTS.forEach(apt => {
    register[apt.n] = DREYER_ELEMENTS_FLAT.map((e, i) => {
      let state;
      if (i < apt.captured) {
        state = 'fixed';
      } else if (i === apt.captured && apt.state === 'mine') {
        state = 'next';
      } else {
        state = 'todo';
      }
      return {
        id: `dre-${apt.n}-${i+1}`,
        element: e.element,
        sub: e.sub,
        state,
        fixedAt: state === 'fixed' && apt.lastWork ? apt.lastWork : (state === 'fixed' ? 'Today' : ''),
        operative: state === 'fixed' ? (apt.by || apt.lastYou ? 'You' : 'Ben Lewis') : '',
        mine: apt.mine && state === 'fixed',
      };
    });
  });
  return register;
};

// Maps a defect (from HOLLY_DEFECTS) to a CAPTURE_TARGETS-shape target.
// Each element type implies a specific product, batch, drawing reference.
// This keeps the threading consistent: tap defect → Capture → save → record links to that defect.
const PRODUCT_BY_ELEMENT = {
  'Cavity barrier':       { product: 'Rockwool Cavitybatt 100mm', batch: 'RW-CB100-2026-0341', drawing: 'BRE-DWG-0023', detail: 'Section B-B' },
  'Fire-stop seal':       { product: 'Hilti CFS-FIL Filler',      batch: 'HC-2026-0451',       drawing: 'BRE-DWG-0024', detail: 'Detail D-04' },
  'Intumescent collar':   { product: 'Hilti CP 643N · 110mm',     batch: 'HC-CP-2026-0118',    drawing: 'BRE-DWG-0019', detail: 'Detail M-12' },
  'Cavity stop sock':     { product: 'ROCKWOOL TCB Slab 50mm',    batch: 'RW-TCB-2026-0089',   drawing: 'BRE-DWG-0027', detail: 'Detail S-08' },
};

const defectToTarget = (defect, location, defectIndex = 0) => {
  if (!defect) return null;
  const productInfo = PRODUCT_BY_ELEMENT[defect.element] || PRODUCT_BY_ELEMENT['Cavity barrier'];
  const isFlat = /^\d+$/.test(String(location));
  return {
    unit: isFlat ? `Flat ${location}` : location,
    elementN: defectIndex + 1,
    element: defect.element,
    sub: defect.sub,
    drawing: productInfo.drawing,
    detail: productInfo.detail,
    product: productInfo.product,
    batch: productInfo.batch,
    si: defect.si,
    defectId: defect.id,
  };
};

          <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8}}>

              const isNoWork = a.state === 'no-work';
              const isBlocked = a.state === 'blocked';
              const isInprog = a.state === 'inprog';
              const pct = a.defectsFound > 0 ? Math.round((a.fixed / a.defectsFound) * 100) : 0;

              const cardBg = isActive ? 'var(--signal-t)' :
                             isDone ? 'var(--go-t)' :

                  <div style={{textAlign: 'left'}}>
                    {isNoWork ? (
                      <div className="mono" style={{fontSize: 8, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.06, lineHeight: 1.3}}>No defects</div>

                      <div className="mono" style={{fontSize: 9, color: 'var(--go)', textTransform: 'uppercase', letterSpacing: 0.06, fontWeight: 700}}>{a.defectsFound} fixed</div>

                      <>

                      <>

                  <div className="mono" style={{fontSize: 11, color: 'var(--ink-2)', fontWeight: 600, lineHeight: 1.1}}>{r.date}</div>
                  <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', marginTop: 2}}>{r.time}</div>
                </div>
                <div style={{flex: 1, minWidth: 0}}>
                  <div style={{fontSize: 13, fontWeight: 500, color: 'var(--ink-1)', marginBottom: 2}}>{r.element}</div>
                  <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', letterSpacing: 0.02}}>

            ))}

          <div style={{marginTop: 22}}>

      )}

      {/* Flag floating */}
      <button onClick={onFlag} style={{position: 'absolute', bottom: 22, right: 22, width: 56, height: 56, borderRadius: 28, background: 'white', border: '1.5px solid var(--stop)', color: 'var(--stop)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: 'var(--shadow-1)', zIndex: 15}}>
        <Icon.Flag/>
      </button>
    </div>
  );
};

/* ================================================================
   SI DETAIL — drill-down for a single Site Instruction
   Shows the instruction, supporting docs, where the work is, what's
   been done, and a CTA to capture the next item.
   ================================================================ */

const SIDetail = ({ siRef = 'SI-052', onBack, onCapture, onPickApartment }) => {
  const si = HOLLY_SIS.find(s => s.ref === siRef) || HOLLY_SIS[1];

  // Find all defects associated with this SI
  const defectsBySI = [];
  Object.entries(HOLLY_DEFECTS).forEach(([location, defects]) => {
    defects.forEach(d => {
      if (d.si === si.ref) {
        defectsBySI.push({ ...d, location });
      }
    });
  });

  const fixedCount = defectsBySI.filter(d => d.state === 'fixed').length;
  const inprogCount = defectsBySI.filter(d => d.state === 'inprog').length;
  const todoCount = defectsBySI.filter(d => d.state === 'todo' || d.state === 'next').length;
  const blockedCount = defectsBySI.filter(d => d.state === 'blocked').length;

  // Group by location for the work-list
  const byLocation = defectsBySI.reduce((acc, d) => {
    (acc[d.location] = acc[d.location] || []).push(d);
    return acc;
  }, {});
  const sortedLocations = Object.keys(byLocation).sort((a, b) => {
    // Common areas first, then numeric flat numbers
    const aIsFlat = /^\d+$/.test(a);
    const bIsFlat = /^\d+$/.test(b);
    if (!aIsFlat && bIsFlat) return -1;
    if (aIsFlat && !bIsFlat) return 1;
    return a.localeCompare(b);
  });

  // Find the next outstanding defect for the capture CTA
  const nextDefect = defectsBySI.find(d => d.state === 'next' || d.state === 'todo' || d.state === 'inprog');

  const stateColor = si.state === 'done' ? 'var(--go)' : si.state === 'inprog' ? 'var(--warn)' : 'var(--ink-3)';

  return (
    <div className="screen fade-up">
      <Status/>
      <div className="screen-id">SI · {si.ref}</div>

      {/* Back */}
      <div style={{padding: '14px 20px 0'}}>
        <button onClick={onBack} className="btn-inline" style={{padding: '8px 14px 8px 10px', gap: 6, fontSize: 13}}>
          <Icon.Back s={16}/> Holly
        </button>
      </div>

      {/* SI Header */}
      <div style={{padding: '18px 24px 0'}}>
        <div style={{display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, flexWrap: 'wrap'}}>
          <span className="mono" style={{fontSize: 12, color: stateColor, fontWeight: 700, letterSpacing: 0.04, padding: '4px 10px', background: si.state === 'inprog' ? 'var(--warn-t)' : 'var(--paper-2)', borderRadius: 6}}>{si.ref}</span>
          {si.priority === 'high' && <span className="pill pill-warn">HIGH PRIORITY</span>}
          {si.hasUnreadResponses && <span className="mono" style={{fontSize: 10, color: 'var(--go)', fontWeight: 700, letterSpacing: 0.06}}>● NEW REPLY FROM QS</span>}
        </div>
        <h1 className="display" style={{fontSize: 30, lineHeight: 1.1, marginBottom: 8}}>{si.title}</h1>
        <div style={{fontSize: 14, color: 'var(--ink-2)', lineHeight: 1.5, marginBottom: 12}}>{si.description}</div>

        {/* Issued by + dates */}
        <div style={{display: 'flex', flexDirection: 'column', gap: 4, padding: '10px 14px', background: 'var(--paper-2)', borderRadius: 8}}>
          <div style={{display: 'flex', justifyContent: 'space-between', fontSize: 12}}>
            <span className="mono" style={{color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.04, fontSize: 10}}>Issued</span>
            <span style={{color: 'var(--ink-2)', fontWeight: 500}}>{si.issued} · {si.issuedBy}</span>
          </div>
          <div style={{display: 'flex', justifyContent: 'space-between', fontSize: 12}}>
            <span className="mono" style={{color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.04, fontSize: 10}}>Target close</span>
            <span style={{color: 'var(--ink-2)', fontWeight: 500}}>{si.targetClose}</span>
          </div>
        </div>
      </div>

      {/* Progress card */}
      <div style={{padding: '20px 22px 0'}}>
        <div style={{background: 'white', borderRadius: 14, padding: '18px 20px', border: '1px solid var(--line)'}}>
          <div style={{display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 12}}>
            <div>
              <div className="data-num" style={{fontSize: 36, lineHeight: 0.9}}>{fixedCount}<span style={{color: 'var(--ink-4)', fontSize: 24}}>/{defectsBySI.length}</span></div>
              <div className="section-heading" style={{marginTop: 6, marginBottom: 0}}>Defects fixed</div>
            </div>
            <div style={{textAlign: 'right'}}>
              <div className="data-num" style={{fontSize: 18, color: stateColor}}>{Math.round((fixedCount / defectsBySI.length) * 100)}%</div>
              <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.08, marginTop: 2}}>Closed out</div>
            </div>
          </div>
          {/* Progress bar */}
          <div style={{height: 5, background: 'var(--paper-2)', borderRadius: 3, overflow: 'hidden'}}>
            <div style={{width: `${Math.round((fixedCount / defectsBySI.length) * 100)}%`, height: '100%', background: stateColor}}></div>
          </div>
          {/* State breakdown */}
          <div style={{marginTop: 14, paddingTop: 14, borderTop: '1px solid var(--line)', display: 'flex', justifyContent: 'space-between', gap: 8}}>
            {fixedCount > 0 && (
              <div style={{flex: 1, textAlign: 'center'}}>
                <div className="data-num" style={{fontSize: 18, color: 'var(--go)'}}>{fixedCount}</div>
                <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.06, marginTop: 2}}>Fixed</div>
              </div>
            )}
            {inprogCount > 0 && (
              <div style={{flex: 1, textAlign: 'center'}}>
                <div className="data-num" style={{fontSize: 18, color: 'var(--signal)'}}>{inprogCount}</div>
                <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.06, marginTop: 2}}>In progress</div>
              </div>

            {todoCount > 0 && (
              <div style={{flex: 1, textAlign: 'center'}}>
                <div className="data-num" style={{fontSize: 18, color: 'var(--ink-3)'}}>{todoCount}</div>
                <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.06, marginTop: 2}}>To do</div>
              </div>
            )}
            {blockedCount > 0 && (
              <div style={{flex: 1, textAlign: 'center'}}>
                <div className="data-num" style={{fontSize: 18, color: 'var(--stop)'}}>{blockedCount}</div>
                <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.06, marginTop: 2}}>Blocked</div>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Supporting documents */}
      <div style={{padding: '24px 22px 0'}}>
        <div className="section-heading">Supporting documents</div>
        <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
          <button style={{width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', background: 'white', border: '1px solid var(--line)', borderRadius: 10, cursor: 'pointer', textAlign: 'left'}}>
            <div style={{width: 32, height: 32, borderRadius: 8, background: 'var(--signal-t)', color: 'var(--signal-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div style={{flex: 1, minWidth: 0}}>
              <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink-1)'}}>Lloyd-WR Survey · §4.2 Cavity barriers</div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2, letterSpacing: 0.04}}>PDF · 12 pages · 18 Feb 2026</div>
            </div>
            <Icon.Chev s={16} style={{color: 'var(--ink-4)', flexShrink: 0}}/>
          </button>
          {si.ref === 'SI-052' && (
            <button style={{width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', background: 'white', border: '1px solid var(--line)', borderRadius: 10, cursor: 'pointer', textAlign: 'left'}}>
              <div style={{width: 32, height: 32, borderRadius: 8, background: 'var(--signal-t)', color: 'var(--signal-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              </div>
              <div style={{flex: 1, minWidth: 0}}>
                <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink-1)'}}>BRE-DWG-0023 Rev C · Cavity barrier detail</div>
                <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2, letterSpacing: 0.04}}>PDF · 1 page · 21 Mar 2026 · supersedes Rev B</div>
              </div>
              <Icon.Chev s={16} style={{color: 'var(--ink-4)', flexShrink: 0}}/>
            </button>
          )}
        </div>
      </div>

      {/* Work locations */}
      <div style={{padding: '28px 22px 0'}}>
        <div className="section-heading">Where the work is</div>
        <div style={{display: 'flex', flexDirection: 'column', gap: 6}}>
          {sortedLocations.map(loc => {
            const defects = byLocation[loc];
            const fixed = defects.filter(d => d.state === 'fixed').length;
            const isFlat = /^\d+$/.test(loc);
            const allDone = fixed === defects.length;
            const hasInprog = defects.some(d => d.state === 'inprog');
            const isBlocked = defects.some(d => d.state === 'blocked') && !defects.some(d => d.state !== 'blocked');

            return (
              <button key={loc} onClick={() => onPickApartment(loc)}
                style={{width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '12px 14px', background: 'white', border: '1px solid var(--line)', borderRadius: 10, cursor: 'pointer', textAlign: 'left'}}>
                <div style={{flex: 1, minWidth: 0}}>
                  <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8}}>
                    <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink-1)'}}>{isFlat ? `Flat ${loc}` : loc}</div>
                    <div className="mono" style={{
                      fontSize: 9,
                      color: allDone ? 'var(--go)' : isBlocked ? 'var(--stop)' : hasInprog ? 'var(--signal)' : 'var(--ink-4)',
                      textTransform: 'uppercase', letterSpacing: 0.06, fontWeight: 700, flexShrink: 0
                    }}>
                      {allDone ? 'Complete' : isBlocked ? 'Blocked' : hasInprog ? 'In progress' : 'To do'}
                    </div>
                  </div>
                  <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 3, letterSpacing: 0.04}}>
                    {fixed}/{defects.length} {defects.length === 1 ? 'defect' : 'defects'} fixed
                  </div>
                </div>
                <Icon.Chev s={14} style={{color: 'var(--ink-4)', flexShrink: 0}}/>
              </button>
            );
          })}
        </div>
      </div>

      {/* Bottom CTA */}
      {nextDefect && (
        <div style={{padding: '28px 22px 28px'}}>
          <button onClick={onCapture} className="btn btn-primary" style={{padding: '16px 22px', fontSize: 15}}>
            <span>Capture next defect for {si.ref}</span>
            <Icon.Arrow/>
          </button>
          <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textAlign: 'center', marginTop: 8, letterSpacing: 0.08, textTransform: 'uppercase', fontWeight: 600}}>
            {todoCount + inprogCount} defect{todoCount + inprogCount === 1 ? '' : 's'} outstanding
          </div>
        </div>
      )}
    </div>
  );
};
