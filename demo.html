          <div onClick={e => e.stopPropagation()} style={{
            background: 'white', borderRadius: 16, padding: '24px 22px',
            maxWidth: 340, width: '100%',
            boxShadow: '0 10px 40px rgba(0,0,0,.2)',
          }}>
            <div className="serif" style={{fontSize: 22, letterSpacing: '-0.02em', lineHeight: 1.2, marginBottom: 10}}>
              Delete "{project.name}"?
            </div>
            <div style={{fontSize: 13, color: 'var(--ink-3)', lineHeight: 1.5, marginBottom: 18}}>
              {projectRecords.length > 0 || draftPacks.length > 0 ? (
                <>This removes the project, its {project.units && project.units.length > 0 ? `${project.units.length} ${isOwn ? 'areas' : 'units'} and ` : ''}{projectRecords.length > 0 && `${projectRecords.length} ${projectRecords.length === 1 ? 'record' : 'records'}`}{projectRecords.length > 0 && draftPacks.length > 0 && ', plus '}{draftPacks.length > 0 && `${draftPacks.length} ${draftPacks.length === 1 ? 'draft pack' : 'draft packs'}`}. This can't be undone.</>
              ) : (
                <>This removes the project and any setup you've done. This can't be undone.</>
              )}
            </div>
            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8}}>
              <button onClick={() => setConfirmingDelete(false)} style={{
                padding: '12px',
                background: 'var(--paper-2)',
                border: 'none', borderRadius: 10,
                fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 13,
                color: 'var(--ink-2)', cursor: 'pointer',
              }}>Cancel</button>
              <button onClick={() => { onDelete(project.id); setConfirmingDelete(false); }} style={{
                padding: '12px',
                background: 'var(--stop)', color: 'white',
                border: 'none', borderRadius: 10,
                fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 13,
                cursor: 'pointer',
              }}>Delete</button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{padding: '12px 28px 0'}}>
        <div style={{display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6}}>
          <span className={`pill ${projTone}`}>{project.workTypeLabel}</span>
        </div>
        <h1 className="display" style={{fontSize: 36, lineHeight: 1.05, marginTop: 2}}>{project.name}</h1>
        {project.address && <div className="mono" style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 6, letterSpacing: 0.04}}>{project.address}</div>}
        {project.recipient && project.recipient.email !== 'self' && (
          <div style={{marginTop: 6, fontSize: 13, color: 'var(--ink-3)'}}>For {project.recipient.name}{project.recipient.role && ` · ${project.recipient.role}`}</div>
        )}
      </div>

      {/* Just-created banner — only shows when no records yet */}
      {projectRecords.length === 0 && (
        <div className="fade-up" style={{margin: '20px 22px 0', padding: '14px 18px', background: 'var(--signal-t)', borderLeft: '3px solid var(--signal-2)', borderRadius: '0 12px 12px 0'}}>
          <div className="mono" style={{fontSize: 9, color: 'var(--signal-2)', textTransform: 'uppercase', letterSpacing: 0.1, fontWeight: 700, marginBottom: 4}}>Just created</div>
          <div style={{fontSize: 13, color: 'var(--ink-2)', lineHeight: 1.5}}>
            Tap a {isOwn ? 'area' : 'unit'} below to define what you're capturing. You can add drawings, invite crew, or jump straight in.
          </div>
        </div>
      )}

      {/* Units grid */}
      {project.units && project.units.length > 0 && (
        <div style={{padding: '24px 22px 0'}}>
          <div style={{display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12}}>
            <div className="section-heading" style={{margin: 0}}>{isOwn ? 'Areas' : 'Units'} ({project.units.length})</div>
            <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', letterSpacing: 0.04}}>{projectRecords.length} {projectRecords.length === 1 ? 'record' : 'records'}</div>
          </div>
          <div style={{display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 8}}>
            {project.units.map(u => {
              const count = recordsByUnit[u.label] || 0;
              return (
                <button key={u.id} onClick={() => onPickUnit && onPickUnit(u.label)} className="fade-up" style={{
                  padding: '14px 14px',
                  background: 'white',
                  border: '1px solid var(--line)',
                  borderLeft: `3px solid ${count > 0 ? projColor : 'var(--line-2)'}`,
                  borderRadius: 10,
                  cursor: 'pointer', textAlign: 'left',
                  display: 'flex', flexDirection: 'column', gap: 6,
                  minHeight: 80,
                }}>
                  <div className="serif" style={{fontSize: 16, color: 'var(--ink-1)', lineHeight: 1.2, letterSpacing: '-0.01em'}}>{u.label}</div>
                  <div style={{flex: 1}}></div>
                  <div style={{display: 'flex', alignItems: 'baseline', justifyContent: 'space-between'}}>
                    <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.08, fontWeight: 700}}>{count === 0 ? 'No records' : `${count} ${count === 1 ? 'record' : 'records'}`}</div>
                    <Icon.Chev s={12} style={{color: 'var(--ink-4)'}}/>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Day works / no-units case */}
      {(!project.units || project.units.length === 0) && (
        <div style={{padding: '24px 22px 0'}}>
          <div className="section-heading">Records</div>
          {projectRecords.length === 0 ? (
            <div style={{padding: '28px 18px', background: 'var(--paper-2)', borderRadius: 14, textAlign: 'center'}}>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', letterSpacing: 0.08, fontWeight: 700, textTransform: 'uppercase', marginBottom: 8}}>No records yet</div>
              <div style={{fontSize: 13, color: 'var(--ink-3)', marginBottom: 16, lineHeight: 1.5}}>
                Tap below to capture your first record on this job.
              </div>
              <button onClick={onCapture} className="btn btn-primary" style={{maxWidth: 280, margin: '0 auto'}}>
                <span>Start capturing</span>
                <Icon.Arrow/>
              </button>
            </div>
          ) : (
            <div style={{background: 'white', border: '1px solid var(--line)', borderRadius: 12, overflow: 'hidden'}}>
              {projectRecords.slice(0, 8).map((r, i) => (
                <div key={r.id} style={{display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderBottom: i < Math.min(projectRecords.length, 8) - 1 ? '1px solid var(--line)' : 'none'}}>
                  <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', width: 60, flexShrink: 0}}>{r.date.slice(5).replace('-', '/')} {r.time}</div>
                  <div style={{flex: 1, minWidth: 0, fontSize: 12, color: 'var(--ink-1)'}}>{r.element}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Project setup actions — drawings, crew, etc. */}
      <div style={{padding: '24px 22px 0'}}>
        <div className="section-heading">Project setup</div>
        <div style={{display: 'flex', flexDirection: 'column', gap: 6}}>
          <button onClick={onUploadDrawings} style={{
            display: 'flex', alignItems: 'center', gap: 12,
            padding: '12px 14px',
            background: 'white',
            border: '1px solid var(--line)',
            borderRadius: 10,
            cursor: 'pointer', textAlign: 'left',
            fontFamily: 'Inter Tight',
          }}>
            <div style={{width: 24, height: 24, borderRadius: 6, background: 'var(--paper-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 14}}>📄</div>
            <div style={{flex: 1, minWidth: 0}}>
              <div style={{fontSize: 13, color: 'var(--ink-1)', fontWeight: 600}}>Drawings & scope</div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2, letterSpacing: 0.04}}>Upload PDFs, photos, audit</div>
            </div>
            <Icon.Chev s={12} style={{color: 'var(--ink-4)'}}/>
          </button>
          <button onClick={onInviteCrew} style={{
            display: 'flex', alignItems: 'center', gap: 12,
            padding: '12px 14px',
            background: 'white',
            border: '1px solid var(--line)',
            borderRadius: 10,
            cursor: 'pointer', textAlign: 'left',
            fontFamily: 'Inter Tight',
          }}>
            <div style={{width: 24, height: 24, borderRadius: 6, background: 'var(--paper-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 14}}>👥</div>
            <div style={{flex: 1, minWidth: 0}}>
              <div style={{fontSize: 13, color: 'var(--ink-1)', fontWeight: 600}}>Invite crew</div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2, letterSpacing: 0.04}}>Share access with team or partners</div>
            </div>
            <Icon.Chev s={12} style={{color: 'var(--ink-4)'}}/>
          </button>
        </div>
      </div>

      {/* Drafts in progress */}
      {draftPacks.length > 0 && (
        <div style={{padding: '24px 22px 0'}}>
          <div className="section-heading">Drafts in progress</div>
          {draftPacks.map(p => (
            <div key={p.id} style={{
              padding: '12px 14px',
              background: 'white',
              border: '1px solid var(--line)',
              borderLeft: '4px solid var(--warn)',
              borderRadius: 10,
              marginBottom: 6,
            }}>
              <div style={{fontSize: 13, fontWeight: 600, color: 'var(--ink-1)'}}>{p.name}</div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 3}}>{p.recordIds.length} records · for {p.recipient.name.split(' ')[0]}</div>
            </div>
          ))}
        </div>
      )}

      {/* Compose pack — only shown if there are records to bundle */}
      {projectRecords.length > 0 && (
        <div style={{padding: '32px 22px 40px'}}>
          <button onClick={onComposePack} className="btn btn-primary">
            <span>Bundle records into a pack</span>
            <Icon.Arrow/>
          </button>
        </div>
      )}
      {projectRecords.length === 0 && project.units && project.units.length > 0 && (
        <div style={{padding: '32px 22px 40px'}}></div>
      )}
    </div>
  );
};


/* ================================================================
   BUILDING VIEW (J) — multi-unit job: apartments, common areas, etc.
   Used for new-build and remedial projects (Holly, Dreyer).
   For own-jobs (Coombe Road), see OwnJobView above.
   ================================================================ */
const BuildingView = ({ projectId = 'oakgrove-holly', onBack, onPickApartment, onFlag, onBuildReport }) => {
  const proj = PROJECT_META[projectId] || PROJECT_META['oakgrove-holly'];
  const [lens, setLens] = useState('unit');  // 'unit' | 'date' | 'instruction'

  const mine = APARTMENTS.filter(a => a.mine);
  const building = APARTMENTS;

  // Group records for the date and instruction lenses
  const byDate = BUILDING_RECORDS.reduce((acc, r) => { (acc[r.date] = acc[r.date] || []).push(r); return acc; }, {});
  const byInstruction = BUILDING_RECORDS.reduce((acc, r) => { (acc[r.instruction] = acc[r.instruction] || []).push(r); return acc; }, {});

  // Pill colour for work type
  const workPillClass = proj.workType === 'remedial' ? 'pill-warn' : 'pill-ink';

  return (
    <div className="screen fade-up">
      <Status/>
      <div className="screen-id">{proj.badgeId}</div>

      {/* Back */}
      <div style={{padding: '14px 20px 0'}}>
        <button onClick={onBack} className="btn-inline" style={{padding: '8px 14px 8px 10px', gap: 6, fontSize: 13}}>
          <Icon.Back s={16}/> Jobs
        </button>
      </div>

      {/* Title */}
      <div style={{padding: '18px 26px 0'}}>
        <div style={{display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, flexWrap: 'wrap'}}>
          <span className="pill pill-signal">{proj.workScope}</span>
          <span className={`pill ${workPillClass}`}>{proj.workTypeLabel}</span>
        </div>
        <h1 className="display" style={{fontSize: 40, marginBottom: 4}}>{proj.name}</h1>
        <div style={{fontSize: 14, color: 'var(--ink-3)'}}>
          {proj.units}
          {proj.qs && ` · ${proj.qs}`}
          {proj.homeowner && ` · For ${proj.homeowner}`}
        </div>
      </div>

      {/* Building progress hero */}
      <div style={{padding: '22px 26px 0'}}>
        <div style={{background: 'white', borderRadius: 20, padding: '18px 22px', boxShadow: 'var(--shadow-1)', border: '1px solid var(--line)'}}>
          <div style={{display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 12}}>
            <div>
              <div className="data-num" style={{fontSize: 44, lineHeight: 0.9}}>54<span style={{color: 'var(--ink-4)', fontSize: 30}}>/168</span></div>
              <div className="section-heading" style={{marginTop: 6, marginBottom: 0}}>Records across building</div>
            </div>
            <div style={{textAlign: 'right'}}>
              <div className="data-num" style={{fontSize: 22, color: 'var(--signal)'}}>32%</div>
              <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.08, marginTop: 2}}>Complete</div>
            </div>
          </div>
          <div style={{height: 5, background: 'var(--paper-2)', borderRadius: 3, overflow: 'hidden'}}>
            <div style={{width: '32%', height: '100%', background: 'var(--signal)'}}></div>
          </div>
        </div>
      </div>

      {/* Your flats today */}
      {mine.length > 0 && (
        <div style={{padding: '26px 26px 0'}}>
          <div className="section-heading">Yours today</div>
          <div style={{display: 'flex', flexDirection: 'column', gap: 8}}>
            {mine.map(a => {
              const s = apState[a.state];
              return (
                <button key={a.n} onClick={() => onPickApartment(a.n)}
                  style={{display: 'flex', alignItems: 'center', gap: 14, padding: '16px 18px',
                          background: a.state === 'mine' ? 'var(--signal-t)' : 'white',
                          border: a.state === 'mine' ? '2px solid var(--signal)' : '1.5px solid var(--line)',
                          borderRadius: 14, cursor: 'pointer', textAlign: 'left', width: '100%'}}>
                  <div className="data-num" style={{fontSize: 24, lineHeight: 1, color: a.state === 'mine' ? 'var(--signal-2)' : 'var(--ink-1)', width: 52}}>{a.n}</div>
                  <div style={{flex: 1}}>
                    <div style={{fontSize: 15, fontWeight: 600, color: 'var(--ink-1)'}}>Flat {a.n}</div>
                    <div className="mono" style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 2}}>{a.done}/{a.total} elements · last captured {a.lastYou}</div>
                  </div>
                  {a.state === 'mine' && (
                    <div style={{display: 'flex', alignItems: 'center', gap: 4}}>
                      <span className="dot dot-signal" style={{width: 6, height: 6}}></span>
                      <span className="mono" style={{fontSize: 10, color: 'var(--signal-2)', textTransform: 'uppercase', letterSpacing: 0.08, fontWeight: 600}}>Continue</span>
                    </div>
                  )}
                  <Icon.Chev style={{color: 'var(--ink-4)'}}/>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Lens toggle — same data, three views */}
      <div style={{padding: '24px 26px 0'}}>
        <div className="section-heading">View</div>
        <div style={{display: 'flex', gap: 6, padding: 4, background: 'var(--paper-2)', borderRadius: 12}}>
          {[
            { id: 'unit', label: 'By unit' },
            { id: 'date', label: 'By date' },
            { id: 'instruction', label: 'By instruction' }
          ].map(l => (
            <button key={l.id} onClick={() => setLens(l.id)}
              style={{flex: 1, padding: '10px 8px', background: lens === l.id ? 'white' : 'transparent', color: lens === l.id ? 'var(--ink-1)' : 'var(--ink-3)', border: 'none', borderRadius: 9, fontSize: 12, fontWeight: lens === l.id ? 700 : 500, cursor: 'pointer', fontFamily: 'JetBrains Mono', letterSpacing: 0.04, textTransform: 'uppercase', boxShadow: lens === l.id ? '0 1px 2px rgba(0,0,0,.06)' : 'none', transition: 'all .15s'}}>
              {l.label}
            </button>
          ))}
        </div>
      </div>

      {/* === LENS: BY UNIT (apartment grid + commons) === */}
      {lens === 'unit' && (
      <div className="fade-up" style={{padding: '22px 26px 120px'}}>
        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14}}>
          <div className="section-heading">All apartments</div>
          <div style={{display: 'flex', alignItems: 'center', gap: 12, fontSize: 11}}>
            <span style={{display: 'flex', alignItems: 'center', gap: 4}}><span className="dot dot-go" style={{width: 6, height: 6}}></span><span className="mono" style={{color: 'var(--ink-4)'}}>Done</span></span>
            <span style={{display: 'flex', alignItems: 'center', gap: 4}}><span className="dot dot-signal" style={{width: 6, height: 6}}></span><span className="mono" style={{color: 'var(--ink-4)'}}>Active</span></span>
            <span style={{display: 'flex', alignItems: 'center', gap: 4}}><span className="dot dot-stop" style={{width: 6, height: 6}}></span><span className="mono" style={{color: 'var(--ink-4)'}}>Blocked</span></span>
          </div>
        </div>

        <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8}}>
          {building.map(a => {
            const s = apState[a.state];
            const pct = Math.round((a.done / a.total) * 100);
            const isMine = a.state === 'mine' || a.state === 'mine-idle';

            return (
              <button key={a.n} onClick={() => onPickApartment(a.n)}
                style={{position: 'relative', aspectRatio: '1/1.1',
                        background: a.state === 'mine' ? 'var(--signal-t)' : (s.tone === 'solid' ? s.bg : 'white'),
                        border: a.state === 'mine' ? '2px solid var(--signal)' :
                                a.state === 'blocked' ? '1.5px solid var(--stop)' :
                                s.tone === 'solid' ? `1.5px solid ${s.color}` :
                                '1.5px solid var(--line)',
                        borderRadius: 14, cursor: 'pointer', padding: 10,
                        display: 'flex', flexDirection: 'column', justifyContent: 'space-between'}}>
                <div style={{display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between'}}>
                  <div className="data-num" style={{fontSize: 22, lineHeight: 0.9, color: a.state === 'todo' ? 'var(--ink-4)' : 'var(--ink-1)'}}>{a.n}</div>
                  {a.state === 'done' && (
                    <div style={{width: 18, height: 18, borderRadius: 9, background: 'var(--go)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                      <Icon.Check s={11}/>
                    </div>
                  )}
                  {a.state === 'blocked' && <span className="dot dot-stop" style={{marginTop: 2}}></span>}
                  {a.state === 'mine' && <span className="dot dot-signal" style={{marginTop: 2}}></span>}
                </div>

                <div style={{textAlign: 'left'}}>
                  {a.state !== 'todo' && a.state !== 'done' && (
                    <div className="mono" style={{fontSize: 9, fontWeight: 600, color: s.color, textTransform: 'uppercase', letterSpacing: 0.05, lineHeight: 1.2, marginBottom: 3}}>
                      {s.label}
                    </div>
                  )}
                  {a.state === 'todo' && <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', textTransform: 'uppercase', letterSpacing: 0.05}}>Not started</div>}
                  {a.state === 'done' && <div className="mono" style={{fontSize: 9, color: 'var(--go)', textTransform: 'uppercase', letterSpacing: 0.05, fontWeight: 600}}>Done</div>}
                  {a.state !== 'todo' && a.state !== 'blocked' && (
                    <div style={{height: 3, background: 'rgba(0,0,0,.06)', borderRadius: 1.5, marginTop: 4, overflow: 'hidden'}}>
                      <div style={{width: `${pct}%`, height: '100%', background: s.color}}></div>
                    </div>
                  )}
                </div>
              </button>
            );
          })}
        </div>

        <div style={{marginTop: 22}}>
          <div className="section-heading">Common areas</div>
          <div style={{display: 'flex', flexDirection: 'column', gap: 4}}>
            {[
              { n: "Core A · Stairwell", done: 4, total: 8, state: 'inprog' },
              { n: "Core B · Stairwell", done: 0, total: 8, state: 'todo' },
              { n: "Ground floor lobby", done: 0, total: 5, state: 'todo' },
              { n: "Plant room", done: 0, total: 6, state: 'todo' },
            ].map(z => (
              <button key={z.n} style={{display: 'flex', alignItems: 'center', gap: 14, padding: '12px 16px', background: 'white', border: '1px solid var(--line)', borderRadius: 12, cursor: 'pointer', textAlign: 'left'}}>
                <Icon.Pin s={16} style={{color: 'var(--ink-4)'}}/>
                <div style={{flex: 1, fontSize: 14, fontWeight: 500}}>{z.n}</div>
                <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)'}}>{z.done}/{z.total}</div>
                <Icon.Chev s={16} style={{color: 'var(--ink-4)'}}/>
              </button>
            ))}
          </div>
        </div>

        {/* Build a report — entry to the slicer */}
        <div style={{marginTop: 22}}>
          <button onClick={onBuildReport} className="btn btn-primary">
            <span>Build a report</span>
            <Icon.Arrow/>
          </button>
        </div>
      </div>
      )}

      {/* === LENS: BY DATE === */}
      {lens === 'date' && (
        <div className="fade-up" style={{padding: '22px 22px 120px'}}>
          <div style={{display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12, paddingLeft: 4}}>
            <div className="overline">Records · most recent first</div>
            <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)'}}>{BUILDING_RECORDS.length} total</div>
          </div>

          {Object.entries(byDate).map(([date, records]) => (
            <div key={date} style={{marginBottom: 16}}>
              <div style={{padding: '10px 4px 8px', borderBottom: '1px solid var(--line)', display: 'flex', alignItems: 'baseline', justifyContent: 'space-between'}}>
                <div className="serif" style={{fontSize: 18, letterSpacing: '-0.02em'}}>{date}</div>
                <div className="mono" style={{fontSize: 10, color: 'var(--ink-4)', letterSpacing: 0.06, textTransform: 'uppercase'}}>{records.length} record{records.length === 1 ? '' : 's'}</div>
              </div>
              {records.map(r => (
                <button key={r.id} onClick={() => onPickApartment(r.unit)} className="fade-up" style={{display: 'flex', alignItems: 'center', gap: 12, width: '100%', padding: '12px 4px', background: 'transparent', border: 'none', borderBottom: '1px solid var(--line)', cursor: 'pointer', textAlign: 'left'}}>
                  <div style={{width: 50, flexShrink: 0}}>
                    <div className="mono" style={{fontSize: 12, color: 'var(--ink-2)', fontWeight: 600, lineHeight: 1.1}}>{r.time}</div>
                  </div>
                  <div style={{flex: 1, minWidth: 0}}>
                    <div style={{fontSize: 14, fontWeight: 500, color: 'var(--ink-1)', marginBottom: 2}}>{r.element}</div>
                    <div className="mono" style={{fontSize: 11, color: 'var(--ink-3)', letterSpacing: 0.02}}>
                      Flat {r.unit} · {r.operative.split(' ')[0]} · <span style={{color: 'var(--ink-4)'}}>{r.instruction}</span>
                      {r.hasVar && <span style={{color: 'var(--warn)', fontWeight: 700, marginLeft: 6}}>· VAR</span>}
                    </div>
                  </div>
                  <Icon.Chev s={16} style={{color: 'var(--ink-4)', flexShrink: 0}}/>
                </button>
              ))}
            </div>
          ))}

          <div style={{marginTop: 22}}>
            <button onClick={onBuildReport} className="btn btn-primary">
              <span>Build a report from a date range</span>
              <Icon.Arrow/>
            </button>
          </div>
        </div>
      )}

      {/* === LENS: BY INSTRUCTION === */}
      {lens === 'instruction' && (
        <div className="fade-up" style={{padding: '22px 22px 120px'}}>
          <div style={{display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12, paddingLeft: 4}}>
            <div className="overline">Authorising instructions</div>
            <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)'}}>{Object.keys(byInstruction).length} refs</div>
          </div>

          {Object.entries(byInstruction).map(([ref, records]) => {
            const isVariation = ref.startsWith('SI');
            return (
              <div key={ref} className="fade-up" style={{marginBottom: 12, background: 'white', borderRadius: 14, boxShadow: 'var(--shadow-1)', overflow: 'hidden'}}>
                <div style={{padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 12, borderBottom: '1px solid var(--line)', borderLeft: `4px solid var(--${isVariation ? 'warn' : 'signal'})`}}>
                  <div style={{flex: 1, minWidth: 0}}>
                    <div className="mono" style={{fontSize: 12, color: 'var(--ink-1)', fontWeight: 700, letterSpacing: 0.02}}>{ref}</div>
                    <div style={{fontSize: 12, color: 'var(--ink-3)', marginTop: 2}}>
                      {ref === 'WO-2025-0441' && 'Works order · Sarah Chen, Crest Nicholson'}
                      {ref === 'SI-051' && 'Site instruction · fire-stopping additional scope'}
                      {ref === 'SI-052' && 'Site instruction · cavity barrier spec change'}
                    </div>
                  </div>
                  <div style={{textAlign: 'right'}}>
                    <div className="data-num" style={{fontSize: 20, color: 'var(--ink-1)', lineHeight: 1}}>{records.length}</div>
                    <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', letterSpacing: 0.06, textTransform: 'uppercase', marginTop: 1}}>records</div>
                  </div>
                </div>
                <div>
                  {records.map(r => (
                    <button key={r.id} onClick={() => onPickApartment(r.unit)} style={{display: 'flex', alignItems: 'center', gap: 12, width: '100%', padding: '10px 16px', background: 'transparent', border: 'none', borderBottom: '1px solid var(--line)', cursor: 'pointer', textAlign: 'left'}}>
                      <div style={{flex: 1, minWidth: 0}}>
                        <div style={{fontSize: 13, color: 'var(--ink-1)', marginBottom: 2}}>{r.element}</div>
                        <div className="mono" style={{fontSize: 11, color: 'var(--ink-3)'}}>Flat {r.unit} · {r.date} {r.time} · {r.operative.split(' ')[0]}</div>
                      </div>
                      <Icon.Chev s={14} style={{color: 'var(--ink-4)', flexShrink: 0}}/>
                    </button>
                  ))}
                </div>
              </div>
            );
          })}

          <div style={{marginTop: 22}}>
            <button onClick={onBuildReport} className="btn btn-primary">
              <span>Build a report by instruction</span>
              <Icon.Arrow/>
            </button>
          </div>
        </div>
      )}

      {/* Flag floating */}
      <button onClick={onFlag} style={{position: 'absolute', bottom: 22, right: 22, width: 56, height: 56, borderRadius: 28, background: 'white', border: '1.5px solid var(--stop)', color: 'var(--stop)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: 'var(--shadow-1)', zIndex: 15}}>
        <Icon.Flag/>
      </button>
    </div>
  );
};

/* ================================================================
   USER UNIT VIEW (UUV) — landing for tapping a unit on a user-created
   project. Defines elements (free-form + smart suggestions) and
   captures against them. Return-to-unit on capture-save.
   ================================================================ */
const UserUnitView = ({ project, unitLabel, records = [], elements = [], drawings = [],
                        onBack, onCapture, onAddElement, onRemoveElement, onRenameUnit,
                        onAddDrawing, onRemoveDrawing }) => {
  const [adding, setAdding] = useState(false);
  const [elementName, setElementName] = useState('');
  const [drawingRef, setDrawingRef] = useState('');
  const [notes, setNotes] = useState('');
  const [renaming, setRenaming] = useState(false);
  const [renameValue, setRenameValue] = useState(unitLabel);

  // Smart-suggestion chips per work type
  const suggestionsByType = {
    'newbuild':  ['Cavity barrier', 'Fire-stop seal', 'Intumescent collar', 'Service penetration', 'Cavity stop sock', 'Plasterboard'],
    'remedial':  ['Cavity barrier', 'Fire-stop seal', 'Intumescent collar', 'Service penetration', 'DPC repair', 'Crack injection'],
    'own':       ['Plasterboard', 'Joists', 'Plumbing first fix', 'Electrical first fix', 'Insulation', 'Tiling', 'Painting'],
    'simple':    ['Repair', 'Replace', 'Inspection', 'Survey', 'Make-good'],
  };
  const suggestions = suggestionsByType[project ? project.workType : 'simple'] || suggestionsByType['simple'];

  // Records captured against this specific unit
  const unitRecords = records.filter(r => r.location === unitLabel);
  // Pending elements — defined but not yet captured (status === 'pending')
  const pendingElements = elements.filter(e => e.unit === unitLabel && e.status === 'pending');
  // Captured elements — for the list (each maps to a record once captured)
  const capturedElements = elements.filter(e => e.unit === unitLabel && e.status === 'captured');
  // Drawings attached to this unit
  const unitDrawings = drawings.filter(d => d.unit === unitLabel);
  // Most-recent drawing — used to pre-fill element form's drawing-ref field
  const latestDrawing = unitDrawings[unitDrawings.length - 1];

  const canSaveElement = elementName.trim().length > 0;

  const handleSaveAndCapture = () => {
    if (!canSaveElement) return;
    const newElement = {
      id: `elem-${Math.random().toString(36).substr(2, 7)}`,
      projectId: project.id,
      unit: unitLabel,
      element: elementName.trim(),
      drawing: drawingRef.trim() || null,
      notes: notes.trim() || null,
      status: 'capturing',
      createdAt: new Date().toISOString().slice(0, 10),
    };
    onAddElement && onAddElement(newElement);
    onCapture && onCapture({
      element: newElement.element,
      drawing: newElement.drawing,
      unit: unitLabel,
      _elementId: newElement.id,
    });
    // Reset form
    setAdding(false);
    setElementName('');
    setDrawingRef('');
    setNotes('');
  };

  const handleSaveForLater = () => {
    if (!canSaveElement) return;
    const newElement = {
      id: `elem-${Math.random().toString(36).substr(2, 7)}`,
      projectId: project.id,
      unit: unitLabel,
      element: elementName.trim(),
      drawing: drawingRef.trim() || null,
      notes: notes.trim() || null,
      status: 'pending',
      createdAt: new Date().toISOString().slice(0, 10),
    };
    onAddElement && onAddElement(newElement);
    setAdding(false);
    setElementName('');
    setDrawingRef('');
    setNotes('');
  };

  const handleCaptureWithoutDefining = () => {
    onCapture && onCapture({
      element: 'Record',
      unit: unitLabel,
      // No element ID — Dave will fill in details inside Capture
    });
  };

  if (!project) return null;
  const projColor = project.workType === 'remedial' ? 'var(--warn)' : 'var(--signal-2)';

  return (
    <div className="screen fade-up">
      <Status/>
      <div className="screen-id">UUV · Unit</div>

      <div style={{padding: '14px 22px 0'}}>
        <button onClick={onBack} className="btn-text" style={{display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 4px', marginLeft: -4}}>
          <Icon.Back s={18}/><span style={{fontSize: 14}}>{project.name}</span>
        </button>
      </div>

      {/* Header — unit name (editable) */}
      <div style={{padding: '12px 28px 0'}}>
        <div className="section-heading">{project.workType === 'own' ? 'Area' : 'Unit'}</div>
        {!renaming ? (
          <h1 className="display" style={{fontSize: 36, lineHeight: 1.05, marginTop: 2, display: 'flex', alignItems: 'center', gap: 10}}>
            {unitLabel}
            <button onClick={() => { setRenameValue(unitLabel); setRenaming(true); }} style={{
              background: 'transparent', border: 'none',
              color: 'var(--ink-4)', cursor: 'pointer',
              fontSize: 13, fontFamily: 'Inter Tight', fontWeight: 500,
              padding: '4px 8px', borderRadius: 6,
            }}>edit</button>
          </h1>
        ) : (
          <div style={{display: 'flex', alignItems: 'center', gap: 8, marginTop: 2}}>
            <input type="text" value={renameValue} onChange={e => setRenameValue(e.target.value)}
              onKeyPress={e => { if (e.key === 'Enter' && renameValue.trim()) { onRenameUnit && onRenameUnit(unitLabel, renameValue.trim()); setRenaming(false); } }}
              autoFocus

            <button onClick={() => { if (renameValue.trim()) { onRenameUnit && onRenameUnit(unitLabel, renameValue.trim()); setRenaming(false); } }}

            <button onClick={() => setRenaming(false)}

                id: `drw-${Math.random().toString(36).substr(2, 7)}`,
                projectId: project.id,
                unit: unitLabel,
                name: `Drawing ${unitDrawings.length + 1}.pdf`,
                source: 'upload',
                addedAt: new Date().toISOString().slice(0, 10),

                background: 'white',
                border: '1.5px solid var(--line-2)',
                borderRadius: 10,

                projectId: project.id,
                unit: unitLabel,

      )}

      {/* Add element — inline form */}
      <div style={{padding: '24px 22px 0'}}>
        {!adding ? (

            setAdding(true);
            // Pre-fill drawing-ref from the most recent unit drawing — saves typing on repeat captures
            if (latestDrawing) setDrawingRef(latestDrawing.name);

        ) : (

              <input type="text" value={drawingRef} onChange={e => setDrawingRef(e.target.value)}

                style={{padding: '10px 12px', border: '1px solid var(--line)', borderRadius: 8, fontSize: 12, fontFamily: 'JetBrains Mono', background: 'white'}}/>
              <textarea value={notes} onChange={e => setNotes(e.target.value)}

                style={{padding: '10px 12px', border: '1px solid var(--line)', borderRadius: 8, fontSize: 12, fontFamily: 'Inter Tight', background: 'white', minHeight: 50, resize: 'vertical'}}/>
            </div>

            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6, marginBottom: 8}}>
              <button onClick={handleSaveForLater} disabled={!canSaveElement} style={{
                padding: '10px', background: 'transparent',
                color: canSaveElement ? 'var(--ink-2)' : 'var(--ink-4)',
                border: `1.5px solid ${canSaveElement ? 'var(--line-2)' : 'var(--line)'}`,
                borderRadius: 8, fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 12,
                cursor: canSaveElement ? 'pointer' : 'not-allowed',
              }}>Save for later</button>
              <button onClick={handleSaveAndCapture} disabled={!canSaveElement} style={{
                padding: '10px',
                background: canSaveElement ? 'var(--ink-1)' : 'var(--paper-2)',
                color: canSaveElement ? 'white' : 'var(--ink-4)',
                border: 'none', borderRadius: 8, fontFamily: 'Inter Tight', fontWeight: 600, fontSize: 12,
                cursor: canSaveElement ? 'pointer' : 'not-allowed',
              }}>Save & capture</button>
            </div>
            <button onClick={() => { setAdding(false); setElementName(''); setDrawingRef(''); setNotes(''); }} style={{
              width: '100%', padding: '8px',
              background: 'transparent', border: 'none',
              color: 'var(--ink-4)', fontFamily: 'Inter Tight', fontSize: 11,
              cursor: 'pointer',
            }}>Cancel</button>
          </div>
        )}
      </div>

      {/* Capture without defining */}
      {!adding && (
        <div style={{padding: '12px 22px 40px'}}>
          <button onClick={handleCaptureWithoutDefining} style={{
            width: '100%', padding: '10px',
            background: 'transparent', border: '1px dashed var(--line-2)',
            borderRadius: 10, fontFamily: 'Inter Tight', fontSize: 12,
            color: 'var(--ink-3)', cursor: 'pointer',
          }}>Or capture without defining first</button>
        </div>
      )}
    </div>
  );
};

const ApartmentView = ({ aptNumber = "504", onBack, onCapture, onSwitch, onFlag, onPreview, onHistory, projectId = 'oakgrove-holly' }) => {
  const [switcherOpen, setSwitcherOpen] = useState(false);
  const apt = APARTMENTS.find(a => a.n === aptNumber) || APARTMENTS[3];
  const proj = (typeof PROJECT_META !== 'undefined' && PROJECT_META[projectId]) || { backLabel: 'Holly', name: 'Holly Building' };
  const isRemedial = proj.workType === 'remedial';
  const isNewBuild = proj.workType === 'newbuild';
  const isFlat = /^\d+$/.test(String(aptNumber));

  // Pick the right per-flat element register based on project.
  // Holly (remedial) → HOLLY_DEFECTS · Dreyer (newbuild) → DREYER_DEFECTS · fallback → generic.
  const flatRegister = isRemedial && HOLLY_DEFECTS[aptNumber] ? HOLLY_DEFECTS[aptNumber]
                     : isNewBuild && DREYER_DEFECTS[aptNumber] ? DREYER_DEFECTS[aptNumber]
                     : null;

  const ELEMENTS = flatRegister
    ? flatRegister.map((d, i) => ({
        n: i + 1,
        t: `${d.element} — ${d.sub}`,
        state: d.state === 'fixed' ? 'done' : d.state === 'inprog' ? 'next' : d.state,
        by: d.mine ? 'You' : (d.operative || ''),
        when: d.fixedAt || '',
        si: d.si,
        hasVar: d.hasVar,
        recordId: d.recordId,
        // Preserve original element fields so we can build a Capture target from them
        element: d.element,
        sub: d.sub,
        defectId: d.id,
      }))
    : [
        { n: 1,  t: "Cavity barrier — living north",     state: "done",  by: "You", when: "Yesterday" },
        { n: 2,  t: "Cavity barrier — living south",     state: "done",  by: "You", when: "Yesterday" },

/* --- Markup overlay (Tier 2) — annotations live as overlay layer, never modify photo --- */
const MarkupSheet = ({ slot, idx, existing, onClose, onSave }) => {
  const [tool, setTool] = useState('arrow');
  const [marks, setMarks] = useState(existing || []);
  const [labelInput, setLabelInput] = useState(null); // {x, y} or null

  const addMark = (e) => {
    if (labelInput) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    if (tool === 'label') {
      setLabelInput({ x, y, text: '' });
    } else {
      setMarks([...marks, { id: Date.now(), type: tool, x, y }]);
    }
  };

  const commitLabel = () => {
    if (labelInput && labelInput.text.trim()) {
      setMarks([...marks, { id: Date.now(), type: 'label', x: labelInput.x, y: labelInput.y, text: labelInput.text.trim() }]);
    }
    setLabelInput(null);
  };

  const undo = () => setMarks(marks.slice(0, -1));

  return (
    <div style={{position: 'absolute', inset: 0, zIndex: 60, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end'}}>
      <div onClick={onClose} style={{position: 'absolute', inset: 0, background: 'rgba(0,0,0,.55)'}}></div>
      <div className="fade-up" style={{position: 'relative', background: '#0A0A0A', borderTopLeftRadius: 24, borderTopRightRadius: 24, paddingTop: 14, color: 'white', height: '92%', display: 'flex', flexDirection: 'column'}}>
        <div style={{width: 44, height: 4, background: 'rgba(255,255,255,.25)', borderRadius: 2, margin: '0 auto 14px'}}></div>

        <div style={{padding: '0 22px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between'}}>
          <div>
            <div className="serif" style={{fontSize: 22, letterSpacing: '-0.02em'}}>Markup</div>
            <div className="mono" style={{fontSize: 10, color: 'rgba(255,255,255,.5)', letterSpacing: 0.08, textTransform: 'uppercase', marginTop: 2}}>{slot} · photo {String(idx).padStart(2,'0')} · overlay only</div>
          </div>
          <button onClick={onClose} style={{width: 36, height: 36, borderRadius: 18, background: 'rgba(255,255,255,.1)', border: 'none', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer'}}>
            <Icon.Close s={18}/>
          </button>
        </div>

        {/* Photo canvas */}
        <div style={{flex: 1, position: 'relative', margin: '0 14px', borderRadius: 12, overflow: 'hidden', background: 'linear-gradient(135deg, #2d3748 0%, #1a202c 100%)', cursor: tool === 'label' ? 'text' : 'crosshair'}} onClick={addMark}>
          <div style={{position: 'absolute', inset: 0, background: 'radial-gradient(circle at 30% 40%, rgba(255,255,255,.08), transparent 60%)'}}></div>

          {/* Annotations rendered on top — separate layer */}
          <svg style={{position: 'absolute', inset: 0, width: '100%', height: '100%', pointerEvents: 'none'}} viewBox="0 0 100 100" preserveAspectRatio="none">
            {marks.map(m => {
              const x = m.x * 100, y = m.y * 100;
              if (m.type === 'arrow') {
                return <g key={m.id}>
                  <line x1={x - 12} y1={y - 7} x2={x - 1} y2={y - 0.5} stroke="#FFC857" strokeWidth="0.7" strokeLinecap="round"/>
                  <polygon points={`${x},${y} ${x-2.5},${y-2} ${x-2.2},${y+1.5}`} fill="#FFC857"/>
                </g>;
              }
              if (m.type === 'circle') {
                return <circle key={m.id} cx={x} cy={y} r="5" fill="none" stroke="#FFC857" strokeWidth="0.7"/>;
              }
              return null;
            })}
          </svg>
          {marks.filter(m => m.type === 'label').map(m => (
            <div key={m.id} style={{position: 'absolute', left: `${m.x * 100}%`, top: `${m.y * 100}%`, transform: 'translate(-50%, -50%)', background: '#FFC857', color: '#0A0A0A', padding: '3px 7px', borderRadius: 4, fontSize: 11, fontWeight: 600, fontFamily: 'Inter Tight', whiteSpace: 'nowrap', pointerEvents: 'none', maxWidth: '50%', overflow: 'hidden', textOverflow: 'ellipsis'}}>{m.text}</div>
          ))}

          {/* Inline label input */}
          {labelInput && (
            <div style={{position: 'absolute', left: `${labelInput.x * 100}%`, top: `${labelInput.y * 100}%`, transform: 'translate(-50%, -50%)', zIndex: 5}} onClick={e => e.stopPropagation()}>
              <input autoFocus value={labelInput.text} onChange={e => setLabelInput({...labelInput, text: e.target.value})} onKeyDown={e => { if (e.key === 'Enter') commitLabel(); if (e.key === 'Escape') setLabelInput(null); }} placeholder="Type label…" style={{padding: '6px 10px', background: '#FFC857', color: '#0A0A0A', border: '2px solid #0A0A0A', borderRadius: 4, fontSize: 12, fontWeight: 600, fontFamily: 'Inter Tight', width: 140, outline: 'none'}}/>
              <button onClick={commitLabel} style={{marginLeft: 6, padding: '6px 10px', background: '#0A0A0A', color: 'white', border: 'none', borderRadius: 4, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter Tight'}}>OK</button>
            </div>

};

                    <button onClick={() => setVariationData({...variationData, countersignSent: true})}
                      style={{display: 'block', marginTop: 8, padding: '6px 12px', background: 'var(--ink-1)', color: 'white', border: 'none', borderRadius: 6, fontSize: 12, fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter Tight'}}>

                <div style={{fontSize: 14, fontWeight: 600}}>{authSource === 'works-order' ? 'Works Order' : authSource === 'si' ? 'Site Instruction' : 'Email or screenshot'}</div>
                <div className="mono" style={{fontSize: 10, color: 'var(--ink-3)', marginTop: 2, textTransform: 'uppercase', letterSpacing: 0.06}}>Authorising this work</div>
              </div>
              <button onClick={() => { setAuthSource(null); setAuthRef(""); setAuthIssuer(""); setAuthDocPhotos(0); }} className="btn-text" style={{fontSize: 12, padding: 0}}>Change</button>
            </div>

            {authSource !== 'email' && (
              <>
                <label className="label-ct">{authSource === 'works-order' ? 'Works Order ref' : 'SI number'}</label>
                <input className={`field ${authRef ? 'filled' : ''}`} value={authRef} onChange={e => setAuthRef(e.target.value)} placeholder={authSource === 'works-order' ? 'e.g. WO-2025-0441' : 'e.g. SI-PFP-007'} style={{fontSize: 16, padding: '12px 14px', marginBottom: 10}}/>

                <label className="label-ct">Issued by</label>
                <input className={`field ${authIssuer ? 'filled' : ''}`} value={authIssuer} onChange={e => setAuthIssuer(e.target.value)} placeholder="e.g. Sarah Chen, Crest" style={{fontSize: 16, padding: '12px 14px'}}/>
              </>
            )}

            {authSource === 'email' && (
              <>
                <button onClick={() => { setAuthDocPhotos(authDocPhotos + 1); flashSave('auth'); }} style={{width: '100%', padding: '12px 14px', background: authDocPhotos > 0 ? 'var(--paper-2)' : 'var(--ink-1)', color: authDocPhotos > 0 ? 'var(--ink-2)' : 'white', border: 'none', borderRadius: 10, fontSize: 13, fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter Tight', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8}}>

                </button>

                  <div style={{display: 'flex', gap: 6, marginTop: 10}}>
                    {Array.from({length: authDocPhotos}).map((_, i) => (

      </div>

      {/* ============ 2/3/4. BEFORE / DURING / AFTER ============ */}

        <PhotoBlock
          slot="before" label="2. Before" required

          viewfinderPrompt="Show the defect — wide and close-up"
          hint="Multiple angles strengthen the record. Tap a photo to mark up."
        />
      )}
      {authDone && beforePhotos > 0 && (
        <PhotoBlock
          slot="during" label="3. During" sublabel="OPTIONAL"
          count={duringPhotos} setCount={setDuringPhotos}
          viewfinderPrompt="The work in progress — opened up, exposed"
          hint="Optional — useful for hidden conditions or process steps."
        />

      {authDone && beforePhotos > 0 && (
        <PhotoBlock
          slot="after" label="4. After" sublabel="RECOMMENDED"
          count={afterPhotos} setCount={setAfterPhotos}
          viewfinderPrompt="The finished work — match the angle of the Before"
          hint="Match the Before angle if you can — strongest pair-evidence."
        />
      )}

      {/* ============ 5. MATERIAL ============ */}
      {authDone && beforePhotos > 0 && afterPhotos > 0 && (
        <div className="fade-up" style={{padding: '24px 22px 0'}}>

            <button onClick={() => { setLabelPhotos(1); flashSave('label'); }} style={{width: '100%', padding: '14px', background: 'var(--ink-1)', color: 'white', border: 'none', borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'Inter Tight', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8}}>
              <Icon.Scan s={18}/> Scan product label
            </button>
          ) : labelFallback ? (
            <div style={{background: 'white', border: '1.5px solid var(--warn)', borderRadius: 14, padding: '14px 16px'}}>
              <label className="label-ct">Product name</label>
              <input className={`field ${manualProduct ? 'filled' : ''}`} value={manualProduct} onChange={e => setManualProduct(e.target.value)} placeholder="e.g. Safeguard Dryzone DPC Cream" style={{fontSize: 16, padding: '12px 14px'}}/>
            </div>
          ) : (
            <div style={{background: 'white', border: '1px solid var(--line)', borderRadius: 14, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 14}}>

              <div style={{flex: 1, minWidth: 0}}>
                <div className="serif" style={{fontSize: 16}}>Safeguard Dryzone DPC Cream</div>
                <div className="mono" style={{fontSize: 11, color: 'var(--ink-3)', marginTop: 2}}>DZ-2025-0411-814</div>
              </div>
            </div>
          )}
          {labelPhotos === 0 && !labelFallback && (
            <button onClick={() => setLabelFallback(true)} style={{marginTop: 8, width: '100%', padding: '8px', background: 'transparent', border: 'none', color: 'var(--ink-3)', fontSize: 12, cursor: 'pointer'}}>No label? Type it</button>
          )}
        </div>
      )}

      {/* ============ 6. DRAWING (state machine, simplified for remedial) ============ */}
      {authDone && beforePhotos > 0 && afterPhotos > 0 && (
        <div className="fade-up" style={{padding: '24px 22px 0'}}>
          <div style={{display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10, paddingLeft: 4}}>
            <div className="overline"><span style={{color: 'var(--ink-1)', fontWeight: 600}}>6.</span> Drawing</div>
            <div className="mono" style={{fontSize: 11, color: drawingState === 'missing' ? 'var(--warn)' : 'var(--go)'}}>
              {drawingState === 'qs-linked' && 'Linked'}
              {drawingState === 'field-scanned' && 'Field-scanned'}
              {drawingState === 'missing' && 'Not on site'}
            </div>
          </div>
          {drawingState === 'qs-linked' && (
            <div style={{background: 'var(--signal-t)', border: '1.5px solid var(--signal)', borderRadius: 14, padding: '14px 16px'}}>
              <div style={{display: 'flex', alignItems: 'center', gap: 14}}>
                <div style={{width: 36, height: 36, borderRadius: 8, background: 'white', color: 'var(--signal-2)', display: 'flex', alignItems: 'center', justifyContent: 'center'}}><Icon.Logo s={18}/></div>
                <div style={{flex: 1}}>
                  <div style={{fontSize: 14, fontWeight: 600}}>BRE-DWG-0014 Rev B</div>
                  <div className="mono" style={{fontSize: 10, color: 'var(--go)', marginTop: 2, textTransform: 'uppercase', letterSpacing: 0.06}}>Linked · QS uploaded</div>
                </div>
                <button onClick={() => setPinnerOpen(true)} className="btn-inline" style={{padding: '8px 12px', fontSize: 12, background: 'var(--ink-1)', color: 'white', border: 'none'}}>Pin</button>
              </div>
              <div style={{display: 'flex', gap: 6, flexWrap: 'wrap', marginTop: 10}}>
                <button onClick={() => setDrawingState('missing')} className="btn-text" style={{fontSize: 11, padding: '4px 8px', color: 'var(--ink-3)', background: 'var(--paper-2)', borderRadius: 6, height: 'auto'}}>No drawing here</button>
              </div>
            </div>
          )}
          {drawingState === 'missing' && (
            <div style={{background: 'var(--warn-t)', border: '1.5px solid var(--warn)', borderRadius: 14, padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 12}}>
              <Icon.Warn s={20} style={{color: 'var(--warn)'}}/>

              <button onClick={() => setDrawingState('qs-linked')} className="btn-text" style={{fontSize: 12, padding: 0}}>Revert</button>
            </div>
          )}
        </div>
      )}

      {/* ============ 7. FINDINGS & RECOMMENDATIONS (Tier 2 — interpretation) ============ */}
      {authDone && beforePhotos > 0 && afterPhotos > 0 && (
        <div className="fade-up" style={{padding: '24px 22px 0'}}>
          <div style={{display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 10, paddingLeft: 4}}>
            <div className="overline"><span style={{color: 'var(--ink-1)', fontWeight: 600}}>7.</span> Findings & Recommendations <span style={{color: '#A07000', fontFamily: 'JetBrains Mono', fontSize: 9, fontWeight: 700, letterSpacing: 0.06, marginLeft: 6}}>TIER 2</span></div>
            {findings && <div className="mono" style={{fontSize: 11, color: 'var(--go)'}}>Recorded</div>}
          </div>

          <div style={{padding: '10px 12px', background: '#FFF1D2', borderRadius: 8, fontSize: 11, color: 'var(--ink-2)', display: 'flex', alignItems: 'flex-start', gap: 8, marginBottom: 12, lineHeight: 1.4}}>
            <div style={{flexShrink: 0, width: 18, height: 18, borderRadius: 9, background: '#A07000', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700}}>T2</div>
            <span><b>Your professional interpretation.</b> Stored separately from the raw evidence — the photos remain unaltered, this is your read on what's there.</span>
          </div>

          <label className="label-ct">What you found</label>
          <textarea className={`field ${findings ? 'filled' : ''}`} value={findings} onChange={e => setFindings(e.target.value)} placeholder="e.g. DPC failure confirmed at base of north wall, 600mm above floor level, full 3.4m width…" rows="3" style={{fontSize: 14, padding: '12px 14px', resize: 'vertical', fontFamily: 'Inter Tight', marginBottom: 12, width: '100%'}}/>

          <label className="label-ct">Recommendations</label>
          <textarea className={`field ${recommendations ? 'filled' : ''}`} value={recommendations} onChange={e => setRecommendations(e.target.value)} placeholder="e.g. Allow 6 weeks drying. External render to be inspected for bridging…" rows="3" style={{fontSize: 14, padding: '12px 14px', resize: 'vertical', fontFamily: 'Inter Tight', width: '100%'}}/>
        </div>
      )}

      {/* ============ SAVE DOCK ============ */}
      {canSave && (
        <div className="fade-up" style={{padding: '28px 22px 32px'}}>
          {gaps.length > 0 && (
            <div style={{padding: '10px 12px', background: 'var(--warn-t)', borderRadius: 10, fontSize: 12, color: 'var(--warn)', marginBottom: 10, lineHeight: 1.4}}>
              <b>Save anyway?</b> Record will show: <span className="mono" style={{fontSize: 11}}>{gaps.join(' · ')}</span>. Weaker evidence if there's a dispute.
            </div>
          )}
          <button onClick={() => setSaved(true)} className={`btn ${gaps.length === 0 ? 'btn-go' : 'btn-secondary'}`} style={gaps.length > 0 ? {background: 'var(--warn)', color: 'white'} : {}}>
            <span>{gaps.length === 0 ? 'Seal this record' : 'Save anyway'}</span><Icon.Arrow/>
          </button>
        </div>
      )}

      {!canSave && authSource && (
        <div style={{padding: '20px 22px', textAlign: 'center', color: 'var(--ink-4)', fontSize: 12}}>
          {!authDone ? 'Add the authorising instruction details' : 'Take at least one Before photo'}
        </div>
      )}

      {justSaved && (
        <div className="fade-up" style={{position: 'fixed', left: '50%', transform: 'translateX(-50%)', bottom: 30, zIndex: 20, background: 'var(--ink-1)', color: 'white', padding: '10px 16px', borderRadius: 999, fontSize: 13, display: 'flex', alignItems: 'center', gap: 8, boxShadow: '0 8px 24px rgba(0,0,0,.2)'}}>
          <div className="dot dot-go" style={{width: 6, height: 6}}></div>
          Saved — your evidence
        </div>
      )}

      {/* Modals */}
      {pinnerOpen && (
        <DrawingPinner onClose={() => setPinnerOpen(false)} onConfirm={(p) => { setPins(p); setPinnerOpen(false); }}/>
      )}
      {markupOpen && (
        <MarkupSheet
          slot={markupOpen.slot} idx={markupOpen.idx}
          existing={annotations[`${markupOpen.slot}-${markupOpen.idx}`] || []}
          onClose={() => setMarkupOpen(null)}
          onSave={(marks) => { setAnnotations({...annotations, [`${markupOpen.slot}-${markupOpen.idx}`]: marks}); setMarkupOpen(null); flashSave('markup'); }}
        />
      )}
    </div>
  );
};

        {onBundleIntoPack && (() => {

          const isOwn = proj && proj.workType === 'own';

          const blurb = isOwn
            ? `Bundle this into a pack to send to ${recipientFirstName} (your client). On your own job you compose and send packs yourself — usually one per stage or invoice.`
            : `Bundle this into a pack. Your foreman reviews everything from the crew and forwards one report through to ${recipientFirstName} at the recipient organisation.`;

};

/* ================================================================
   06b  REPORT BUILDER  (RB)  — slice the project for a pack
   ================================================================ */
const ReportBuilder = ({ onBack, onCompose }) => {
  const [scope, setScope] = useState(null);  // 'all' | 'date' | 'units' | 'instruction' | 'worktype' | 'since-last'
  const [dateFrom, setDateFrom] = useState('');
  const [dateTo, setDateTo] = useState('');
  const [pickedUnits, setPickedUnits] = useState([]);
  const [pickedInstruction, setPickedInstruction] = useState('');
  const [pickedWorkType, setPickedWorkType] = useState('');

  // Compute which records would be in the pack — used for the live preview
  const filteredRecords = (() => {
    if (!scope) return BUILDING_RECORDS;
    if (scope === 'all') return BUILDING_RECORDS;
    if (scope === 'date' && (dateFrom || dateTo)) {
      return BUILDING_RECORDS.filter(r => {
        if (dateFrom && r.dateRaw < dateFrom) return false;
        if (dateTo && r.dateRaw > dateTo) return false;
        return true;
      });
    }
    if (scope === 'units' && pickedUnits.length) {
      return BUILDING_RECORDS.filter(r => pickedUnits.includes(r.unit));
    }
    if (scope === 'instruction' && pickedInstruction) {
      return BUILDING_RECORDS.filter(r => r.instruction === pickedInstruction);
    }
    if (scope === 'worktype' && pickedWorkType) {
      return BUILDING_RECORDS.filter(r => r.workType === pickedWorkType);
    }
    if (scope === 'since-last') {
      // mock: pretend last pack went out 22 Apr — anything from 22 Apr onward
      return BUILDING_RECORDS.filter(r => r.dateRaw >= '2026-04-22');
    }
    return BUILDING_RECORDS;
  })();

  const allUnits = [...new Set(BUILDING_RECORDS.map(r => r.unit))].sort();
  const allInstructions = [...new Set(BUILDING_RECORDS.map(r => r.instruction))];
  const allWorkTypes = [...new Set(BUILDING_RECORDS.map(r => r.workType))];

  const opts = [
    { id: 'all', label: 'The whole project', sub: 'Everything captured to date', icon: '🏠' },
    { id: 'since-last', label: 'Since my last submitted pack', sub: 'Everything new — for an interim AFP', icon: '📤' },
    { id: 'date', label: 'A date range', sub: 'A specific period — last week, last month, custom', icon: '📅' },
    { id: 'units', label: 'Specific units', sub: 'Pick which flats — a per-property passport slice', icon: '🏢' },
    { id: 'instruction', label: 'A specific instruction', sub: 'Everything authorised under one WO or SI', icon: '📄' },
    { id: 'worktype', label: 'A specific work type', sub: 'All fire-stopping, all damp work, etc.', icon: '🛠' }
  ];

  const canCompose = scope && (
    scope === 'all' || scope === 'since-last' ||
    (scope === 'date' && (dateFrom || dateTo)) ||
    (scope === 'units' && pickedUnits.length) ||
    (scope === 'instruction' && pickedInstruction) ||
    (scope === 'worktype' && pickedWorkType)
  );

  const toggleUnit = (u) => setPickedUnits(pickedUnits.includes(u) ? pickedUnits.filter(x => x !== u) : [...pickedUnits, u]);

  return (
    <div className="screen fade-up">
      <Status/>
      <div className="screen-id">RB · Report builder</div>

      <div style={{padding: '14px 22px 0'}}>
        <button onClick={onBack} className="btn-text" style={{display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 4px', marginLeft: -4}}>
          <Icon.Back s={18}/><span style={{fontSize: 14}}>Project</span>
        </button>
      </div>

      <div style={{padding: '12px 28px 0'}}>
        <div className="section-heading">Build a report</div>
        <h1 className="display" style={{fontSize: 32, lineHeight: 1.05, marginTop: 2}}>What's in this report?</h1>
        <div style={{marginTop: 8, fontSize: 14, color: 'var(--ink-3)'}}>Same evidence base — different lens. The records aren't duplicated; this report just references them.</div>
      </div>

      {/* Scope picker */}
      <div style={{padding: '24px 22px 0'}} className="stagger">
        {opts.map(o => (
          <button key={o.id} onClick={() => setScope(o.id)} className="fade-up"
            style={{display: 'flex', alignItems: 'flex-start', gap: 14, width: '100%', padding: '16px 18px',
                    background: scope === o.id ? 'var(--signal-t)' : 'white',
                    border: scope === o.id ? '1.5px solid var(--signal)' : '1px solid var(--line)',
                    borderRadius: 12, marginBottom: 8, cursor: 'pointer', textAlign: 'left'}}>
            <div style={{width: 40, height: 40, borderRadius: 10, background: 'var(--paper-2)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: 20}}>{o.icon}</div>
            <div style={{flex: 1, minWidth: 0}}>
              <div className="serif" style={{fontSize: 17, letterSpacing: '-0.01em', marginBottom: 2}}>{o.label}</div>
              <div style={{fontSize: 12, color: 'var(--ink-3)', lineHeight: 1.4}}>{o.sub}</div>
            </div>
            {scope === o.id && (
              <div style={{width: 22, height: 22, borderRadius: 11, background: 'var(--signal)', color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0}}>
                <Icon.Check s={13}/>
              </div>
            )}
          </button>
        ))}
      </div>

      {/* Sub-pickers — each scope needs its own */}
      {scope === 'date' && (
        <div className="fade-up" style={{padding: '20px 22px 0'}}>
          <div className="section-heading">Pick a date range</div>
          <div style={{display: 'flex', gap: 10, marginBottom: 10}}>
            <div style={{flex: 1}}>
              <label className="label-ct">From</label>
              <input type="date" className={`field ${dateFrom ? 'filled' : ''}`} value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{fontSize: 14, padding: '12px 14px'}}/>
            </div>
            <div style={{flex: 1}}>
              <label className="label-ct">To</label>
              <input type="date" className={`field ${dateTo ? 'filled' : ''}`} value={dateTo} onChange={e => setDateTo(e.target.value)} style={{fontSize: 14, padding: '12px 14px'}}/>
            </div>
          </div>
          <div style={{display: 'flex', flexWrap: 'wrap', gap: 6}}>
            {[
              { l: 'Last 7 days', from: '2026-04-20', to: '2026-04-27' },
              { l: 'This week', from: '2026-04-21', to: '2026-04-27' },
              { l: 'Last week', from: '2026-04-14', to: '2026-04-20' },
              { l: 'April', from: '2026-04-01', to: '2026-04-30' }
            ].map(p => (
              <button key={p.l} onClick={() => { setDateFrom(p.from); setDateTo(p.to); }} style={{padding: '6px 12px', background: 'var(--paper-2)', border: '1px solid var(--line)', borderRadius: 999, fontSize: 12, color: 'var(--ink-2)', cursor: 'pointer', fontFamily: 'Inter Tight'}}>{p.l}</button>
            ))}
          </div>
        </div>
      )}

      {scope === 'units' && (
        <div className="fade-up" style={{padding: '20px 22px 0'}}>
          <div className="section-heading">Pick units · {pickedUnits.length} selected</div>
          <div style={{display: 'flex', flexWrap: 'wrap', gap: 6}}>
            {allUnits.map(u => {
              const isPicked = pickedUnits.includes(u);
              return (
                <button key={u} onClick={() => toggleUnit(u)}
                  style={{padding: '8px 14px', background: isPicked ? 'var(--signal-2)' : 'white',
                          color: isPicked ? 'white' : 'var(--ink-2)',
                          border: `1.5px solid ${isPicked ? 'var(--signal-2)' : 'var(--line)'}`,
                          borderRadius: 999, fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: 'Inter Tight'}}>
                  {u}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {scope === 'instruction' && (
        <div className="fade-up" style={{padding: '20px 22px 0'}}>
          <div className="section-heading">Pick an instruction</div>
          {allInstructions.map(ref => (
            <button key={ref} onClick={() => setPickedInstruction(ref)} style={{display: 'flex', alignItems: 'center', gap: 12, width: '100%', padding: '12px 14px', background: pickedInstruction === ref ? 'var(--signal-t)' : 'white', border: `1.5px solid ${pickedInstruction === ref ? 'var(--signal)' : 'var(--line)'}`, borderRadius: 10, marginBottom: 6, cursor: 'pointer', textAlign: 'left'}}>
              <div className="mono" style={{fontSize: 12, fontWeight: 700, color: 'var(--ink-1)', letterSpacing: 0.02, flex: 1}}>{ref}</div>
              <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)'}}>{BUILDING_RECORDS.filter(r => r.instruction === ref).length} records</div>
            </button>
          ))}
        </div>
      )}

      {scope === 'worktype' && (
        <div className="fade-up" style={{padding: '20px 22px 0'}}>
          <div className="section-heading">Pick a work type</div>
          {allWorkTypes.map(wt => (
            <button key={wt} onClick={() => setPickedWorkType(wt)} style={{display: 'flex', alignItems: 'center', gap: 12, width: '100%', padding: '12px 14px', background: pickedWorkType === wt ? 'var(--signal-t)' : 'white', border: `1.5px solid ${pickedWorkType === wt ? 'var(--signal)' : 'var(--line)'}`, borderRadius: 10, marginBottom: 6, cursor: 'pointer', textAlign: 'left'}}>
              <div style={{flex: 1, fontSize: 14, fontWeight: 500}}>{wt}</div>
              <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)'}}>{BUILDING_RECORDS.filter(r => r.workType === wt).length} records</div>
            </button>
          ))}
        </div>
      )}

      {/* Live preview of what's in */}
      {canCompose && (
        <div className="fade-up" style={{padding: '24px 22px 0'}}>
          <div className="section-heading">This report will contain</div>
          <div style={{background: 'white', border: '1px solid var(--line)', borderRadius: 14, padding: '16px 18px'}}>
            <div style={{display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 12}}>
              <div className="data-num" style={{fontSize: 32, color: 'var(--ink-1)', lineHeight: 1}}>{filteredRecords.length}</div>
              <div style={{fontSize: 13, color: 'var(--ink-3)'}}>records · {[...new Set(filteredRecords.map(r => r.unit))].length} units · {[...new Set(filteredRecords.map(r => r.operative))].length} operatives</div>
            </div>
            {filteredRecords.length > 0 && (
              <div style={{paddingTop: 12, borderTop: '1px solid var(--line)', maxHeight: 200, overflowY: 'auto'}}>
                {filteredRecords.slice(0, 6).map(r => (
                  <div key={r.id} style={{display: 'flex', gap: 10, padding: '6px 0', fontSize: 12, color: 'var(--ink-3)'}}>
                    <span className="mono" style={{flexShrink: 0, color: 'var(--ink-4)'}}>{r.date}</span>
                    <span style={{flex: 1, minWidth: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap'}}>Flat {r.unit} · {r.element}</span>
                  </div>
                ))}
                {filteredRecords.length > 6 && <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)', padding: '6px 0'}}>+ {filteredRecords.length - 6} more</div>}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Bottom CTA */}
      <div style={{padding: '24px 22px 32px'}}>
        <button onClick={onCompose} disabled={!canCompose} className="btn btn-primary" style={{opacity: canCompose ? 1 : 0.4, cursor: canCompose ? 'pointer' : 'default'}}>
          <span>{canCompose ? `Compose ${filteredRecords.length}-record report` : 'Pick a scope'}</span>
          <Icon.Arrow/>
        </button>
      </div>
    </div>
  );
};

/* ================================================================

const UnitHistory = ({ unit = '501', onBack, onOpenRecord, projectId = 'oakgrove-holly' }) => {

  const distinctOps = [...new Set(records.map(r => r.operative))];
  const distinctInst = [...new Set(records.map(r => r.instruction))];
  const proj = (typeof PROJECT_META !== 'undefined' && PROJECT_META[projectId]) || { name: 'Holly Building' };
  const isFlat = /^\d+$/.test(String(unit));

  return (
    <div className="screen fade-up">
      <Status/>
      <div className="screen-id">UH · Unit history</div>

      <div style={{padding: '14px 22px 0'}}>
        <button onClick={onBack} className="btn-text" style={{display: 'inline-flex', alignItems: 'center', gap: 6, padding: '8px 4px', marginLeft: -4}}>
          <Icon.Back s={18}/><span style={{fontSize: 14}}>Project</span>
        </button>

      <div style={{padding: '12px 28px 0'}}>
        <div className="section-heading">Property history · {proj.name}</div>
        <h1 className="display" style={{fontSize: 36, lineHeight: 1.05, marginTop: 2}}>{isFlat ? `Flat ${unit}` : unit}</h1>
        <div style={{marginTop: 6, fontSize: 13, color: 'var(--ink-3)'}}>Every record ever filed against this property</div>
      </div>

      {/* Stats strip */}
      <div style={{padding: '20px 22px 0'}}>
        <div style={{display: 'flex', alignItems: 'stretch', background: 'white', borderRadius: 14, boxShadow: 'var(--shadow-1)', overflow: 'hidden'}}>
          <div style={{flex: 1, padding: '14px 8px', textAlign: 'center'}}>
            <div className="data-num" style={{fontSize: 24, color: 'var(--ink-1)', lineHeight: 1.1}}>{records.length}</div>
            <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', letterSpacing: 0.1, fontWeight: 700, marginTop: 4}}>RECORDS</div>
          </div>
          <div style={{width: 1, background: 'var(--line)'}}></div>
          <div style={{flex: 1, padding: '14px 8px', textAlign: 'center'}}>
            <div className="data-num" style={{fontSize: 24, color: 'var(--ink-1)', lineHeight: 1.1}}>{distinctOps.length}</div>
            <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', letterSpacing: 0.1, fontWeight: 700, marginTop: 4}}>OPERATIVES</div>
          </div>
          <div style={{width: 1, background: 'var(--line)'}}></div>

            <div className="mono" style={{fontSize: 9, color: 'var(--ink-4)', letterSpacing: 0.1, fontWeight: 700, marginTop: 4}}>INSTRUCTIONS</div>

      {/* Timeline */}
      <div style={{padding: '24px 22px 40px'}}>

        {Object.entries(byDate).map(([date, recs]) => (

                <div className="mono" style={{fontSize: 11, color: 'var(--ink-4)', flexShrink: 0, width: 42}}>{r.time}</div>
